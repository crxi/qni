  authors: ["Marcello Caleffi", "Angela Sara Cacciapuoti"]
  publisher: "IEEE Transactions on Network Science and Engineering"
  year: 2026
  type: paper
  doi: "10.1109/TNSE.2026.3679795"
  url: "https://arxiv.org/abs/2602.19998"
  note: "Rejects the layered model. Replaces encapsulation + demultiplexing with 'ordering by certification': each node runs a local Dynamic Kernel that constructs a Plan of Actions; quantum packets carry a Meta-header with an append-only list of Stamps recording committed actions; the end-to-end stamp sequence forms a distributed certification graph. The only proposal in the landscape that explicitly abandons layering."

