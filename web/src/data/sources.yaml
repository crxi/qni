  note: "Two-plane quantum-native architecture: Quantum Data Plane (entangled-qubit forwarding) + Quantum Control Plane (lifecycle orchestration), plus Quantum Internet Addressing (QIA), Generalised Quantum Forwarding (GQF), and Entanglement-Defined Controllers. Companion IRTF draft: draft-cacciapuoti-qirg-quantum-native-architecture (individual submission, Apr 2026). The first complete post-RFC 9340 architecture with both addressing and forwarding specified."

- id: caleffi-ieeetnse-2026
