    orbital validation. Platform: SITAEL (Italy); quantum payload:
    Tesat Spacecom (Germany); optical ground terminals: DLR (Germany)
    and a Dutch team. LEO orbit; trusted-node QKD with ground-station
    passes. Consortium: Austria, Belgium, Czech Republic, Germany,
    Italy, Luxembourg, Netherlands, Switzerland; 20+ European
    companies involved. System paper: arXiv:2505.20838.

