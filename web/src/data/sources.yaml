  doi: "10.1364/AOP.361502"
  url: "https://arxiv.org/abs/1906.01645"
  note: "Comprehensive QKD review. The BB84 / BBM92 secret-key rate stays positive while the QBER is below ~11 % in the asymmetric-protocol analysis (Shor–Preskill); for a Werner-state Bell pair with fidelity F the QBER in either basis is 2(1−F)/3, so F ≈ 0.835 is the cut-off — F ≳ 0.85 is the rule-of-thumb fidelity needed for entanglement-based key distillation."

- id: fowler-pra-86-032324
  title: "Surface codes: Towards practical large-scale quantum computation"
  authors: ["Austin G. Fowler", "Matteo Mariantoni", "John M. Martinis", "Andrew N. Cleland"]
  publisher: "Physical Review A"
  year: 2012
  type: paper
  doi: "10.1103/PhysRevA.86.032324"
  url: "https://arxiv.org/abs/1208.0928"
  note: "Canonical surface-code FT-QC analysis. Sets the ~1 % per-gate error threshold below which a logical qubit can be protected with polynomial overhead — the source of the F > 0.99 Bell-pair-fidelity target for distributed quantum computing that uses teleported gates."

- id: pirandola-natcomm-8-15043
  title: "Fundamental limits of repeaterless quantum communications"
  authors: ["Stefano Pirandola", "Riccardo Laurenza", "Carlo Ottaviani", "Leonardo Banchi"]
  publisher: "Nature Communications"
  year: 2017
  type: paper
  doi: "10.1038/ncomms15043"
  url: "https://arxiv.org/abs/1510.08863"
  note: "The PLOB bound — for a pure-loss channel with transmittance η, the secret-key (and entanglement-distribution) capacity is upper-bounded by −log₂(1−η) bits per channel use. The canonical 'why repeaters are necessary' theorem: above some loss, no end-to-end protocol can sustain a useful rate without intermediate quantum nodes."

- id: hong-ou-mandel-prl-59-2044
  title: "Measurement of subpicosecond time intervals between two photons by interference"
  authors: ["C. K. Hong", "Z. Y. Ou", "L. Mandel"]
  publisher: "Physical Review Letters"
  year: 1987
  type: paper
  doi: "10.1103/PhysRevLett.59.2044"
  note: "Original HOM (Hong–Ou–Mandel) experiment. Two indistinguishable photons entering a 50:50 beam splitter on opposite ports always exit on the same side — the 'HOM dip'. The visibility of this dip sets the success rate and output fidelity of every photonic Bell-state measurement, swapping operation, and midpoint-source architecture."

# ── Networked / distributed quantum sensing ──────────────────────────
# Sensing subject (tier D). Foundations (Degen, Giovannetti) plus the
# network-required line: clock networks, quantum-enhanced telescopy, and
# distributed multiparameter estimation. gottesman-prl-2012 and
# komar-natphys-2014 live above with the other entanglement-era papers.

- id: degen-rmp-2017
  title: "Quantum sensing"
  authors: ["C. L. Degen", "F. Reinhard", "P. Cappellaro"]
  publisher: "Reviews of Modern Physics"
  year: 2017
  type: paper
  doi: "10.1103/RevModPhys.89.035002"
  note: "The standard reference for quantum sensing. Definitions, sensor platforms (neutral atoms, trapped ions, Rydberg atoms, solid-state spins, superconducting circuits), the sensing protocol, sensitivity, and the quantum Cramér–Rao bound. Experimentalist's viewpoint; deliberately skips atomic clocks and photonic sensors as standalone topics."

- id: giovannetti-natphoton-2011
  title: "Advances in quantum metrology"
  authors: ["Vittorio Giovannetti", "Seth Lloyd", "Lorenzo Maccone"]
  publisher: "Nature Photonics"
  year: 2011
  type: paper
  doi: "10.1038/nphoton.2011.35"
  note: "The estimation-theory side: parameter estimation, the standard-quantum-limit → Heisenberg-limit scaling argument, and the treatment of noise and experimental imperfections. Shorter and more theoretical than Degen."

- id: zhang-zhuang-qst-2021
  title: "Distributed quantum sensing"
  authors: ["Zheshen Zhang", "Quntao Zhuang"]
  publisher: "Quantum Science and Technology"
  year: 2021
  type: paper
  doi: "10.1088/2058-9565/abd4c3"
  note: "Formulates distributed quantum sensing from a quantum-information perspective: continuous-variable and discrete-variable protocols, performance limits, and experimental demonstrations. The review that maps onto entangled-network architecture — shared multipartite entanglement across nodes for estimating global parameters, with the entanglement-vs-separable scaling comparison."

- id: komar-prl-2016
  title: "Quantum Network of Atom Clocks: A Possible Implementation with Neutral Atoms"
  authors: ["Péter Kómár", "Turker Topcu", "Eric M. Kessler", "Andrei Derevianko", "Vladan Vuletić", "Jun Ye", "Mikhail D. Lukin"]
  publisher: "Physical Review Letters"
  year: 2016
  type: paper
  doi: "10.1103/PhysRevLett.117.060506"
  note: "A concrete neutral-atom implementation of the clock-network proposal: GHZ states across separated ensembles via Rydberg-mediated local operations and single-photon channels."

- id: nichol-nature-2022
  title: "An elementary quantum network of entangled optical atomic clocks"
  authors: ["B. C. Nichol", "R. Srinivas", "D. P. Nadlinger", "P. Drmota", "D. Main", "G. Araneda", "C. J. Ballance", "D. M. Lucas"]
  publisher: "Nature"
  year: 2022
  type: paper
  doi: "10.1038/s41586-022-05088-z"
  note: "Experimental two-node realization of an entangled optical-clock network: two ⁸⁸Sr⁺ ions on a photonic link, with entanglement reducing the frequency-comparison uncertainty by ≈√2 (the Heisenberg-limited value). Proposal (Kómár 2014) → demonstration."

- id: khabiboulline-prl-2019
  title: "Optical Interferometry with Quantum Networks"
  authors: ["Emil T. Khabiboulline", "Johannes Borregaard", "Kristiaan De Greve", "Mikhail D. Lukin"]
  publisher: "Physical Review Letters"
  year: 2019
  type: paper
  doi: "10.1103/PhysRevLett.123.070504"
  note: "Recasts long-baseline optical interferometry using quantum networks and local quantum memories, reducing the entanglement-distribution cost of Gottesman's telescope-baseline scheme. Companion to the PRA 'Quantum-assisted telescope arrays' analysis."

- id: proctor-prl-2018
  title: "Multiparameter Estimation in Networked Quantum Sensors"
  authors: ["Timothy J. Proctor", "Paul A. Knott", "Jacob A. Dunningham"]
  publisher: "Physical Review Letters"
  year: 2018
  type: paper
  doi: "10.1103/PhysRevLett.120.080501"
  note: "Establishes the framework for estimating global functions of locally-sensed parameters across a network of entangled sensors, and when entanglement between nodes helps versus local strategies."

- id: eldredge-pra-2018
  title: "Optimal and secure measurement protocols for quantum sensor networks"
  authors: ["Zachary Eldredge", "Michael Foss-Feig", "Jonathan A. Gross", "Steven L. Rolston", "Alexey V. Gorshkov"]
  publisher: "Physical Review A"
  year: 2018
  type: paper
  doi: "10.1103/PhysRevA.97.042337"
  note: "Optimal protocols for measuring a linear function of field values at networked sensors, plus a security guarantee — the network can be operated so that only the intended recipient learns the result. The secure-network angle that maps onto the quantum-internet framing."

- id: guo-natphys-2020
  title: "Distributed quantum sensing in a continuous-variable entangled network"
  authors: ["Xueshi Guo", "Casper R. Breum", "Johannes Borregaard", "Shuro Izumi", "Mikkel V. Larsen", "Tobias Gehring", "Matthias Christandl", "Jonas S. Neergaard-Nielsen", "Ulrik L. Andersen"]
  publisher: "Nature Physics"
  year: 2020
  type: paper
  doi: "10.1038/s41567-019-0743-x"
  note: "Experimental continuous-variable demonstration: a multipartite-entangled (CV) three-node network estimates an averaged phase with precision beyond what separable probes allow."

- id: xia-prl-2020
  title: "Demonstration of a Reconfigurable Entangled Radio-Frequency Photonic Sensor Network"
  authors: ["Yi Xia", "Wei Li", "William Clark", "Darlene Hart", "Quntao Zhuang", "Zheshen Zhang"]
  publisher: "Physical Review Letters"
  year: 2020
  type: paper
  doi: "10.1103/PhysRevLett.124.150502"
  note: "Reconfigurable entangled sensor network for radio-frequency signals, demonstrating an entanglement-enabled advantage for estimating a tunable global parameter across the network."

- id: malia-nature-2022
  title: "Distributed quantum sensing with mode-entangled spin-squeezed atomic states"
  authors: ["Benjamin K. Malia", "Yunfan Wu", "Julián Martínez-Rincón", "Mark A. Kasevich"]
  publisher: "Nature"
  year: 2022
  type: paper
  doi: "10.1038/s41586-022-05363-z"
  note: "Distributed sensing with mode-entangled, spin-squeezed atomic ensembles — an atomic-platform route to networked sensing beyond the standard quantum limit."

- id: pirandola-natphoton-2018
  title: "Advances in photonic quantum sensing"
  authors: ["Stefano Pirandola", "Bhaskar Roy Bardhan", "Tobias Gehring", "Christian Weedbrook", "Seth Lloyd"]
  publisher: "Nature Photonics"
  year: 2018
  type: paper
  doi: "10.1038/s41566-018-0301-6"
  note: "Review of photonic quantum sensing — the optical-probe ground that Degen's solid-state-spin-centric review deliberately leaves out. Useful complement for the photonic sensor-network demonstrations."
