  publisher: "Microsoft"
  year: 2022
  type: press
  url: "https://blogs.microsoft.com/blog/2022/12/09/microsoft-acquires-lumenisity-an-innovator-in-hollow-core-fiber-hcf-cable/"
  local_archive: "reference/web-archive/microsoft-lumenisity-press-2022.html"
  marker: "Microsoft / Lumenisity HCF acquisition, 9 Dec 2022"
  note: |
    Microsoft acquired Lumenisity Limited in December 2022.
    Lumenisity: 2017 spinout from the Optoelectronics Research Centre
    (ORC) at the University of Southampton. The HCF technology
    transmits light ~47 % faster than standard silica (light speed in
    vacuum vs in silica) and offers intrusion-detection signatures via
    the hollow-core design. Microsoft's stated use case: serve
    customers with strict latency and security requirements in
    healthcare, finance, government and manufacturing. HCF was
    pre-commercial at the time of acquisition (CoreSmart had industry
    recognition but no large-scale deployment yet). Hyperscaler
    validation that anchors the workspace's HCF working hypothesis.

