- id: ibm-cisco-qnu-press-2025
  title: "IBM and Cisco announce plans to build a network of large-scale, fault-tolerant quantum computers"
  publisher: "IBM Newsroom"
  year: 2025
  type: press
  url: "https://newsroom.ibm.com/2025-11-20-ibm-and-cisco-announce-plans-to-build-a-network-of-large-scale,-fault-tolerant-quantum-computers"
  local_archive: "reference/web-archive/ibm-cisco-qnu-press-2025.html"
  marker: "IBM × Cisco × Fermilab/SQMS Quantum Networking Units, 20 Nov 2025"
  note: |
    Joint IBM × Cisco × Fermilab/SQMS plan announced 20 Nov 2025 to
    build a networked distributed quantum computing system by the
    early 2030s, with a proof-of-concept demonstration within five
    years (target end of 2030). Stated goal scale: computations
    spanning tens to hundreds of thousands of qubits across multiple
    separate cryogenic systems. Three components named as not yet
    shipping at scale — (1) microwave-to-optical transducers,
    (2) Quantum Networking Units (QNUs) at each QC node, (3)
    entanglement-distribution protocols for inter-system qubit
    transfer. IBM owns the QC processors + QNU interfaces, Cisco
    owns the networking infrastructure, Fermilab's Superconducting
    Quantum Materials and Systems Center (SQMS) contributes the
    underlying materials research.

- id: qunnect-cisco-brooklyn-press-2026
  title: "Cisco and Qunnect deploy first commercial-grade entanglement-swap network on Brooklyn–Manhattan metro fibre"
  publisher: "Qunnect"
  year: 2026
  type: press
  url: "https://www.qunnect.inc/press-releases/2026-02-18"
  local_archive: "reference/web-archive/qunnect-cisco-brooklyn-press-2026.html"
  marker: "Cisco × Qunnect Brooklyn–Manhattan, 18 Feb 2026"
  note: |
    Entanglement-swap demonstration over 17.6 km of deployed telecom
    fibre between Brooklyn and Manhattan via QTD Systems' datacentre,
    announced 18 Feb 2026. Measured swap rates: 1.7M+ pairs/hr
    locally; 5,400 pairs/hr over the deployed-fibre link. Polarisation
    fidelity >99 % maintained. Hardware: Qunnect Carina; software:
    Cisco quantum networking stack. The first commercial-fibre metro
    entanglement-swap demonstration on existing carrier infrastructure
    — the operational benchmark for entanglement-distribution-as-a-
    service.

- id: cisco-uqs-press-2026
  title: "Cisco introduces Universal Quantum Switch, advancing the path to a quantum network"
  publisher: "Cisco Newsroom"
  year: 2026
  type: press
  url: "https://newsroom.cisco.com/c/r/newsroom/en/us/a/y2026/m04/cisco-introduces-universal-quantum-switch-advancing-the-path-to-a-quantum-network.html"
  local_archive: "reference/web-archive/cisco-uqs-press-2026.html"
  marker: "Cisco Universal Quantum Switch (UQS), 23 Apr 2026"
  note: |
    Working research prototype announced 23 Apr 2026 (NOT a commercial
    product). Routes quantum information across polarisation, time-
    bin, frequency-bin and path encodings via a Cisco-patented
    conversion engine — the explicit industrial response to the Q2
    heterogeneity problem. Specs as quoted: room-temperature operation
    over standard telecom fibre, nanosecond electro-optic switching
    (1 ns reconfiguration), <1 W power, ≤4 % quantum-state-fidelity
    degradation during conversion. Named strategic collaborators: IBM,
    Qunnect, Atom Computing. Complements Cisco's quantum-entanglement
    chip and network-aware quantum compiler from the Santa Monica
    quantum labs.

