  note: |
    Canadian Space Agency QKD microsatellite mission; 2026 launch
    target with a 1-year primary mission (extendable). University of
    Waterloo Institute for Quantum Computing leads the science;
    Honeywell designs, builds, tests and launches the satellite.
    QKD direction: uplink (ground laser to satellite) — the harder
    direction technically, but enables the satellite as a trusted-
    node relay between widely-separated ground stations. Motivating
    target: bypass the ~200 km ground-fibre QKD reach limit.

- id: cqt-spooqy1-2020
  title: "SpooQy-1 demonstrates quantum entanglement in space"
  publisher: "Centre for Quantum Technologies, NUS"
  year: 2020
  type: web
  url: "https://www.cqt.sg/highlight/2020-06-spooqy-quantum-satellite/"
  local_archive: "reference/web-archive/cqt-spooqy1-2020.html"
  marker: "SpooQy-1 (Singapore CQT / SpeQtral)"
  note: |
    2.6 kg CubeSat nanosatellite. Launched to ISS April 2019;
    deployed to orbit 17 June 2019. Carried a blue-laser-pumped
    nonlinear-crystal entangled-photon source. The Optica paper
    (Villar et al., Optica 7(7) 734, 25 June 2020) confirmed entangled
    pair generation in orbit across the satellite's operational
    temperature range. CQT (National University of Singapore) led the
    mission; spinoff SpeQtral commercialised the follow-on programme
    aimed at satellite-to-ground transmission. First CubeSat-class
    in-orbit entanglement demonstration.

- id: microsoft-lumenisity-press-2022
