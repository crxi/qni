positioning: >
  South Korea's third mobile carrier and a subsidiary of LG Corporation
  (KOSPI:032640). LG U+'s quantum-safe networking has centred on post-quantum
  cryptography (PQC) more than QKD: in April 2022 the company launched
  what it described as the world's first commercial PQC-protected dedicated-line
  service for enterprise customers, building on a 2020 PQC pilot connecting
  LG Innotek's Pyeongtaek plant to a Busan data centre and Eulji Medical
  Center. QKD activity exists alongside the PQC line but is smaller-scale
  than SK Telecom's or KT's; LG U+'s broader quantum work also includes
  D-Wave quantum-annealing trials for 6G non-terrestrial network planning.

