logo:
  domain: qolab.ai

positioning: >
  Superconducting quantum-computing hardware startup co-founded by 2025
  Physics Nobel laureate John Martinis (CTO), Alan Ho (CEO, ex-Google Quantum
  AI Head of Product), and UW–Madison professor Robert McDermott (Head of
  Hardware). Focus is wafer-scale, semiconductor-compatible transmon
  fabrication, applying 300 mm CMOS tooling and a subtractive-etch window-
  junction process to replace traditional lift-off for higher-yield,
  reproducible qubit chips. Engineering office in Los Angeles with the device
  lab in Madison, Wisconsin; the first quantum startup incubated at UW–Madison.

