positioning: >
  Jena-based spin-off of Fraunhofer IOF, founded in 2020 by Kevin Füchsel and
  Oliver de Vries to commercialise entangled-photon-pair sources and
  entanglement-based QKD systems for fibre networks, critical infrastructure,
  and future satellite payloads. The product line covers the full chain: EPS
  1550 photon-pair source, polarisation-analysis modules, and the ELVIS
  multi-user QKD system. ELVIS distributes keys to three or more parties
  simultaneously from a single entangled source, removing the trusted-node
  requirement within the covered network segment. The company participates in
  EuroQCI and the Horizon Europe Qu-Test certification programme.

