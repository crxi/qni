positioning: >
  Silicon CMOS spin-qubit quantum computing. UNSW Sydney spin-out built around
  Andrew Dzurak's decade-plus programme on electron-spin qubits in silicon MOS
  quantum dots. The thesis is foundry compatibility: Diraq designs the device,
  partner foundries (imec on 300 mm, GlobalFoundries on CMOS development) fabricate
  it with industry-standard tools. September 2025 Nature paper with imec reported
  >99% one- and two-qubit gate fidelity and >99.9% SPAM from randomly-selected
  300 mm samples — achieving scalable error-correction-threshold fidelity from
  a commercial-fab process rather than a bespoke device.

