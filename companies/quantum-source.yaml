positioning: >
  Israeli photonic fault-tolerant quantum-computing company founded in 2021
  by Oded Melamed, Gil Semo, Dan Charash, and Barak Dayan (Weizmann
  Institute quantum optics). Uses single atoms trapped near a photonic chip
  as both deterministic photon sources and photon-photon gate mediators —
  designed to produce large photonic graph (resource) states
  deterministically rather than via the probabilistic linear-optical
  multiplexing that dominates competing photonic-FTQC roadmaps.
  Pre-commercial; closed a USD 50M Series A in September 2024 led by Eclipse
  Ventures, bringing total funding above USD 77M.

