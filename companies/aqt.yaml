slug: aqt
name: Alpine Quantum Technologies (AQT)
categories: [qc]
hq: Innsbruck, Austria
founded: 2018
status: private
parent: null
logo:
  domain: aqt.eu

positioning: >
  Trapped-ion quantum computers built around calcium-40 (and ytterbium where
  the wavelength suits) optical qubits in rack-mounted 19-inch form factor.
  University of Innsbruck spin-out from the Blatt / Zoller groups, founded
  in 2018 by Rainer Blatt, Thomas Monz, and Peter Zoller — the team that
  realised the first controlled-NOT gate on trapped ions. Sells full-stack
  systems (PINE, MARMOT, IBEX) to HPC centres and research institutes across
  Europe, with cloud access via Amazon Braket and Scaleway. IBEX Q1 (12
  qubits, 24-qubit entanglement demonstrated) went live on Amazon Braket in
  November 2025.

