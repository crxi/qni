positioning: >
  Quantum-networking hardware company founded in 2012 in Vista, California,
  commercialising entangled-photon-pair sources and associated quantum network
  equipment — photon-pair sources, single-photon detectors, fibre-optic
  switches, and correlated-timing hardware — under the Bohr product line.
  Supplied the entanglement-distribution infrastructure for the EPB Quantum
  Network in Chattanooga, Tennessee, the first commercially available quantum
  network in the United States (launched November 2022). Accumulated a
  portfolio of 118 U.S. and international patents in quantum networking
  hardware and quantum network security. Acquired by IonQ on 6 January 2025
  for USD 22M; operates as IonQ's quantum-networking hardware business line,
  with the team and patent portfolio integrated into IonQ's networking roadmap.

