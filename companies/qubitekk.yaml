    source_url: https://www.ionq.com/news/ionq-completes-acquisition-of-qubitekk-solidifying-leadership-in-quantum
    source_type: press
  - date: 2024-12
    tag: network
    headline: >
      Awarded USD 21M SBIR Phase III contract by the US Air Force Research
      Laboratory for quantum networking R&D to establish secure and robust
      communications systems
    source_url: https://orangeslices.ai/qubitekk-awarded-a-21m-sbir-phase-iii-contract-for-us-air-force-research-laboratory-quantum-network/
    source_type: press
  - date: 2024-11-06
    tag: network
    headline: >
      IonQ announces definitive agreement to acquire substantially all
      Qubitekk assets; transaction anticipated to close within six months
    source_url: https://investors.ionq.com/news/news-details/2024/IonQ-to-Acquire-Qubitekk-Furthering-Leadership-in-Quantum-Networking/default.aspx
    source_type: press
  - date: 2023-12
    tag: network
    headline: >
      Qubitekk and Qunnect demonstrate first quantum networking equipment
      interoperability on a commercial network — Qunnect's QU-APC polarisation
      stabiliser validated against Qubitekk's entangled-photon source on
      EPB Quantum Network (Dec 4–6, 2023)
    source_url: https://www.prnewswire.com/news-releases/quantum-technology-pioneers-qubitekk-and-qunnect-achieve-first-equipment-interoperability-on-epb-quantum-network-powered-by-qubitekk-302019186.html
    source_type: press
  - date: 2023-09
    tag: network
    headline: >
      EPB Quantum Network and Aliro Quantum unveil quantum network controller
      integration at Quantum World Congress; Qubitekk Bohr-IV hardware
      operates as the entanglement layer under Aliro's software-defined
      network orchestration
    source_url: https://www.hpcwire.com/off-the-wire/epb-quantum-network-and-aliro-quantum-to-unveil-quantum-network-developments-at-quantum-world-congress/
    source_type: press
  - date: 2022-11
    tag: network
    headline: >
      EPB Quantum Network powered by Qubitekk launches in Chattanooga, TN —
      the first commercially available quantum network in the United States;
      Bohr-IV integrated quantum network equipment provides entangled-photon
      sources, single-photon detectors, fibre-optic switches, and
      quantum-as-a-service access
    source_url: https://www.prnewswire.com/news-releases/epb-and-qubitekk-launch-commercial-quantum-network-to-accelerate-development-and-adoption-of-quantum-products-301690778.html
    source_type: press
  - date: 2021
    tag: network
    headline: >
      QED (Quantum Ensured Defense of the Smart Electric Grid) project wins
      R&D 100 Award; collaboration with ORNL, Los Alamos National Laboratory,
      and EPB applying quantum entanglement to protect power-grid control
      signals — Qubitekk as industry partner
    source_url: https://epb.com/newsroom/press-releases/ornl-los-alamos-national-lab-epb-win-rd-100-award/
    source_type: press
  - date: 2016
    tag: network
    headline: >
      Launches QED: Quantum Ensured Defense of the Smart Electric Grid
      initiative in partnership with EPB, ORNL, and Los Alamos National
      Laboratory, applying quantum key distribution to utility grid
      automation signals
    source_url: https://www.ornl.gov/news/ornl-partnership-epb-tests-new-method-protecting-quantum-networks
    source_type: press
  - date: 2014
    tag: network
    headline: >
      Receives USD 3M DOE Cybersecurity for Energy Delivery Systems (CEDS)
      grant; partners with ORNL, Pacific Northwest National Laboratory,
      University of Texas at Austin, Sandia National Laboratory, and
      Pacific Gas & Electric to develop quantum encryption for power grid
      protection
    source_url: https://www.prnewswire.com/news-releases/qubitekk-to-receive-federal-funding-to-help-protect-nations-power-grid-from-cyber-attack-272714421.html
    source_type: press
  - date: 2012
    tag: network
    headline: >
      Company founded by Stan Ellis and Duncan Earl in Vista, California,
      to commercialise quantum-optic-based cybersecurity solutions for
      electric-grid automation equipment; backed by Ellis Energy Investments
    source_url: https://thequantuminsider.com/2020/05/05/qubitekk-vision-to-become-leading-global-quantum-technology-provider/
    source_type: press

