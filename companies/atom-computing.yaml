roadmap:
  - target: 2025
    item: >
      Deliver commercial machine with Microsoft on Azure Quantum based on the
      24/28-logical-qubit architecture
    source_url: https://azure.microsoft.com/en-us/blog/quantum/2024/11/19/microsoft-and-atom-computing-offer-a-commercial-quantum-machine-with-the-largest-number-of-entangled-logical-qubits-on-record/
    tag: qc
  - target: 2026
    item: >
      Advance quantum error correction, develop networking technology for
      modular scale-up, and design third-generation systems with ~10,000
      physical qubits (~10x prior generation)
    source_url: https://atom-computing.com/wp-content/uploads/2025/01/Atom-Computing-Whitepaper-2025.pdf
    tag: qc
  - target: 2027
    item: >
      Magne — 50 logical qubits built from ~1,225 physical neutral-atom
      qubits — operational at QuNorth, Copenhagen (with Microsoft); Level-2
      fault-tolerant commercial system
    source_url: https://quantumcomputingreport.com/denmarks-qunorth-to-acquire-50-logical-qubit-magne-quantum-computer-from-atom-computing-and-microsoft/
    tag: qc

