    as_of: 2026-05-13
    note: >
      Microsoft + Atom Computing 24-logical-qubit work uses a [[d,1,d]] color
      / surface-style code per Azure Quantum blog; no Atom-Computing
      peer-reviewed code-paper citation found.
  - field: modalities.qc.logical_qubits_current
    as_of: 2026-05-13
    note: >
      24 entangled logical qubits demonstrated (28 with EC) in the
      Microsoft x Atom Computing Nov 2024 blog; the peer-reviewed paper has not been independently confirmed.
  - field: modalities.network.role
    as_of: 2026-05-13
    note: >
      Atom Computing has stated 2026 networking-technology development as a
      roadmap item; no networking product or atom-photon entanglement paper
      has been published under the Atom Computing name as of this
      verification date. Strontium-87 and Yb-171
      neutral-atom platforms emit photons at optical wavelengths natively, so
      a microwave-to-optical transducer is not required for inter-machine
      photonic interconnect — a structural advantage over superconducting
      platforms. Closest external reference: PRX Quantum 6, 010101 (2025)
      and Nature Communications 16 (2025) on nanofiber- and cavity-mediated
      atom-photon entanglement (not Atom Computing-authored).
