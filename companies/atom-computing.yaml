positioning: >
  US neutral-atom quantum-computing company building nuclear-spin qubits in
  optical tweezer arrays. Founded at UC Berkeley in 2018; HQ in Berkeley, CA
  with a 17,000 sq-ft systems-build facility in Boulder, CO. First prototype
  ("Phoenix", 2021) used strontium-87 atoms in a 10x10 array; the second-
  generation platform pivoted to ytterbium-171 nuclear-spin qubits and in 2023
  became the first gate-based quantum computer to cross 1,000 qubits
  (1,180 atoms in a 1,225-site array). Now co-developing the 50-logical-qubit
  Magne machine with Microsoft for delivery to QuNorth (Copenhagen) in 2027.

