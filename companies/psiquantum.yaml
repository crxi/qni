positioning: >
  Silicon-photonic fault-tolerant quantum computing. Chips are fabricated on
  300 mm wafers at GlobalFoundries; the architecture is fusion-based (FBQC)
  and targets a single utility-scale, million-qubit machine rather than a
  NISQ product line. Founded in 2016 by Jeremy O'Brien, Terry Rudolph, Pete
  Shadbolt, and Mark Thompson. Funded in part by the Australian and
  Queensland governments (A$940M, 2024) to site the first system in
  Brisbane, with a second US site at the Illinois Quantum and
  Microelectronics Park in Chicago. The Omega manufacturable chipset
  launched in February 2025 (Nature). Closed a USD 1B Series E in September
  2025 led by BlackRock at a ~USD 7B valuation.

