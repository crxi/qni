slug: tesat-spacecom
name: Tesat-Spacecom
categories: [enabling, qkd]
hq: Backnang, Baden-Württemberg, Germany
founded: 1991
status: acquired
parent: airbus
logo:
  domain: tesat.de

positioning: >
  Independently operating subsidiary of Airbus Defence and Space;
  manufactures space-borne optical-communication terminals — the LCT135
  GEO/LEO laser-comm family flown on the European Data Relay System since
  2007 and the SCOT family for LEO constellations. The dossier covers
  Tesat's QKD-payload role: the SCOT80 terminal forms the optical link for
  Europe's first sovereign LEO QKD satellite, Eagle-1, where Tesat builds
  both the telescope and the integrated on-board QKD module (C-band
  phase-encoded BB84 + decoy-state). Eagle-1 launches on Vega-C from Kourou
  in late 2026 / early 2027.

modalities:
  qkd:
    protocol: [BB84, decoy-state]
    rate_distance: "C-band phase-encoded double-pulse qubits over a SCOT80 free-space downlink (~500-1000 km LEO slant range); on-board QKD module integrated with the optical terminal"
    deployed_demos:
      - "Eagle-1 LEO QKD satellite — QKD payload + SCOT80 terminal under build for SES Techcom / ESA / EC (launch late 2026 / early 2027)"
  enabling:
    products:
      - "SCOT80 — scalable optical communication terminal for LEO constellations, 8000 km link range; QKD-capable variant used as the Eagle-1 payload telescope"
      - "LCT135 — 135 mm aperture laser communication terminal flown on EDRS (SpaceDataHighway), 9 units in orbit since 2007"
      - "ConLCT — laser terminal product for commercial LEO constellations"

