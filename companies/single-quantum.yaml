positioning: >
  Dutch single-photon-detection vendor selling closed-cycle
  superconducting-nanowire single-photon-detector (SNSPD) systems to
  quantum-information, LIDAR, and deep-space-optical-communications
  customers. Spun out of TU Delft in 2012 by Sander Dorenbos and Val Zwiller
  to commercialise NbN SNSPDs developed in the Delft quantum-optics group.
  Flagship Eos closed-cycle multi-channel SNSPD system reports >90% system
  detection efficiency and <15 ps timing jitter across visible-to-telecom
  bands. Competes with IDQ, Photon Spot, and Quantum Opus in the
  multi-channel SNSPD market; roadmap targets larger pixel counts and
  detector arrays for imaging applications.

