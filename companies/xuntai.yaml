logo:
  domain: xtquantech.com

positioning: >
  Shanghai Xuntai Quantum Technology Co., Ltd. (上海循态量子科技有限公司, XT Quantech)
  is a spin-out of the Quantum Sensing and Information Processing (QSIP) group
  at Shanghai Jiao Tong University, focusing on continuous-variable QKD (CV-QKD)
  with local-local-oscillator coherent detection — distinct from the
  discrete-variable BB84 systems fielded by most Chinese QKD vendors. Founded
  in 2017 in Shanghai, it released its first commercial CV-QKD product in June
  2018 and has since expanded to quantum random number generators, security
  gateways, and coherent detector components. Customers span power, rail
  transit, gas-utility, and finance sectors in China.

modalities:
  qkd:
    protocol: [CV-QKD, GG02, discrete-modulated CV-QKD, one-dimensional CV-QKD]
    rate_distance: >
      Gaussian-modulated LLO CV-QKD: 10.37 Mbps @ 20 km, 1.61 Mbps @ 50 km,
      337 kbps @ 70 km, 58 kbps @ 100 km SMF (NJP 26, 2024; Yingming Zhou
      co-affiliated with XT Quantech). Multi-protocol system: 1–10 Mbps at
      10–100 MHz repetition rate (Optics Letters 48, 719, 2023).
    deployed_demos:
      - note: >
          Four-campus CV-QKD metropolitan-area network across Shanghai Jiao Tong
          University sites (Minhang, Qibao, Xujiahui, Fahua) using XT Quantech
          CV-QKD hardware; field trial reported in collaboration with QSIP
        source_url: https://iopscience.iop.org/article/10.1088/1367-2630/ad1b7e
      - note: >
          China Academy of Railway Sciences engagement (2022) to explore CV-QKD
          integration in high-speed rail communication systems
        source_url: https://www.scmp.com/news/china/science/article/3186402/chinese-companies-begin-embrace-quantum-technology
      - note: >
          Participation in China Mobile "Illuminate 100 Cities" quantum test
          network initiative, announced at China Mobile Partner Conference
          (October 2024)
        source_url: https://www.xtquantech.com/qbxw
      - note: >
          Collaboration with China Unicom on CUBE-Net 3.0 quantum-secure
          infrastructure, announced at China Unicom Partner Conference
          (July 2024)
        source_url: https://www.xtquantech.com/qbxw
  enabling:
    products:
      - CV-QKD transceivers (CVQKD series) — Gaussian-modulated LLO coherent-detection, 10–100 MHz, 1–10 Mbps secure key
      - Quantum random number generators (QRNG series) — vacuum-fluctuation homodyne detection entropy source
      - Quantum security gateways (QSG-200)
      - Wavelength-division multiplexing equipment (QWDM-100)
      - Intelligent acceleration network cards (IAC series)
      - Quantum key and storage security platforms (QKSM series)
      - Continuous-variable quantum signal sources (chip-level)
      - Broadband quantum coherent detectors
      - Bias-point controllers and adjustable attenuators

