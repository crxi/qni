key_personnel:
  - role: Chairman & Chief Scientist
    name: Zeng Guihua (曾贵华)
    since: 2017
    source_url: https://www.xtquantech.com/gsjs
    note: >
      Tenured professor at Shanghai Jiao Tong University and Director of the
      Quantum Sensing and Information Processing (QSIP) Research Institute.
      Humboldt Scholar. Author of 300+ papers with 10,000+ citations; 100+
      patent applications. Principal investigator of the SJTU CV-QKD research
      programme that XT Quantech commercialises.
  - role: CEO & Co-founder
    name: Wang Chao (汪超)
    since: 2017
    source_url: https://www.xtquantech.com/gsjs
    note: >
      Legal representative of the company. Wuhan University graduate; SJTU PhD.
      Over 15 years of telecommunications product R&D management experience.
      Led development of the company's high-speed CV-QKD systems, QRNG, and
      quantum security gateways.

