positioning: >
  Dutch photonic-hardware company spun out of the University of Twente in
  2019. Builds reconfigurable photonic processors on low-loss
  silicon-nitride integrated waveguides — universal interferometer meshes
  used as the linear-optical core of a photonic quantum computer. The
  flagship 20-mode silicon-nitride processor reports ~2.9 dB loss and >90%
  transformation fidelity across its 20 programmable modes. Sells
  processors as modules and as full
  single-photon systems to academic and industrial customers. Closed a EUR
  15M Series A in July 2025 to deliver a first-generation universal
  single-photon quantum computer.

