positioning: >
  US neutral-atom quantum-technology company spun out of the University of
  Colorado (Boulder) in 2007 as ColdQuanta, rebranded to Infleqtion in 2022.
  Builds rubidium (Rb) neutral-atom quantum computers ("Sqale"), rubidium
  atomic clocks ("Tiqker"), and cold-atom sensing systems for positioning,
  navigation, and timing. Acquired the quantum-software developer Super.tech
  in 2022, integrating the SuperstaQ compiler stack. Listed on NYSE under
  ticker INFQ on 17 February 2026 following a SPAC merger with Churchill
  Capital Corp X at a USD 1.8B valuation. Customers include NVIDIA, the US
  Department of Defense, NASA, and the UK government.

