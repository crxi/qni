positioning: >
  Sparrow Quantum makes deterministic single-photon sources based on
  self-assembled InAs/GaAs quantum dots embedded in photonic-crystal
  waveguides. The flagship device emits long strings of indistinguishable
  single photons into a single optical-fibre mode and is sold to photonic
  quantum-computing builders and research groups in photonic interconnects
  and quantum communications. Spin-out from Peter Lodahl's quantum-photonics
  group at the Niels Bohr Institute, University of Copenhagen, building on
  two decades of group R&D on light-matter coupling efficiency. Positioned
  as the on-demand alternative to probabilistic SPDC heralded sources.

