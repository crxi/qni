logo:
  domain: magiqtech.com

positioning: >
  One of the earliest commercial QKD vendors. Founded 1999 by Bob Gelfond; in
  2003 announced Navajo, marketed as the first commercial QKD product, followed
  by the QPN series (QPN 5505 / 7505 / 8505) in 2004-2006. Commercial QKD
  visibility has declined since the mid-2010s; the company has diversified
  into RF spectrum-recovery hardware for the US Department of Defense (AIMS)
  and, more recently, fibre-optic seismic sensing (GeoLite). Customer base
  centres on US defence and research agencies — Air Force, Navy, Army, DARPA,
  DOE, NASA — alongside energy and critical-infrastructure operators.

