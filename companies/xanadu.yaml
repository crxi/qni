positioning: >
  Photonic quantum computing company building room-temperature,
  fibre-networked machines based on continuous-variable squeezed light and
  GKP (Gottesman-Kitaev-Preskill) bosonic qubits. Founded in Toronto in 2016
  by Christian Weedbrook; demonstrated quantum computational advantage with
  Borealis (Nature 606, 75, 2022) and launched Aurora in January 2025 — a
  universal modular photonic QC across four server racks, 35 chips, and 13
  km of fibre. Ships the open-source PennyLane SDK alongside the X-series /
  Borealis / Aurora hardware lines, with Borealis available on AWS Braket.
  Listed publicly on Nasdaq and TSX via a 2026 SPAC merger with Crane Harbor
  Acquisition Corp.

