positioning: >
  Australian silicon-spin quantum-computing company spun out of Michelle
  Simmons' group at UNSW Sydney, headquartered on the UNSW Kensington campus
  inside the ARC Centre of Excellence CQC2T. Distinctive among silicon-spin
  vendors for STM-lithographed atomic-precision placement of phosphorus
  donors in silicon (P-in-Si), rather than the CMOS-foundry electrostatic
  quantum-dot route taken by Diraq, Quantum Motion and Intel. First
  commercial product is the Quantum Twins analog quantum simulator (launched
  February 2026 for materials and chemistry), with early customers including
  Commonwealth Bank, Telstra and the Australian Department of Defence.

