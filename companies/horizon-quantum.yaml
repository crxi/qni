  - field: modalities.qc.physical_qubits_current
    as_of: 2026-05-21
    note: 9 reflects Rigetti's Novera 9-qubit transmon chip (3×3 tunable-coupler lattice) that Horizon integrated into Ember One; Novera also ships a 5-qubit test die in the same puck but the 9-qubit die is the operational QPU. Horizon does not publish its own fidelity / coherence numbers — those depend on the as-installed Novera die and are not separately disclosed by Horizon
