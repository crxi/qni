logo:
  domain: horizonquantum.com

positioning: >
  Software-first quantum company building a hardware-agnostic IDE (Triple Alpha) and
  algorithm-synthesis compiler stack that converts classical source code into quantum
  programs. In December 2025 deployed Ember One — what the company described as the
  first quantum computer owned and operated by a quantum-software firm — a
  Singapore-deployed system integrating a Maybell cryogenic platform, Quantum
  Machines control electronics, and a Rigetti Novera superconducting QPU.
  Listed on Nasdaq as "HQ" in March 2026 via dMY Squared
  SPAC merger.

modalities:
  software:
    products:
      - Triple Alpha — hardware-agnostic, web-based quantum IDE; compile-and-deploy environment portable across QPU backends
      - Helium — high-level Turing-complete quantum programming language with classical-style control flow (if / loops / increment)
      - Hydrogen — lower-level assembly-style IR supporting concurrent classical-quantum computation and dynamic control flow
      - Beryllium — object-oriented quantum programming language (debuted Dec 2025) layered above Helium
  qc:
    qubit_type: transmon
    physical_qubits_current: 9
    logical_qubits_current: 0
    one_q_fidelity: null
    two_q_fidelity: null
    coherence_t1_ms: null
    coherence_t2_ms: null
    ec_code: null
    connectivity: square-lattice
    gate_set: []

