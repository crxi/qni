positioning: >
  Cold-atom quantum gravimeter for mineral, hydrocarbon, geothermal and groundwater
  exploration. Flagship product Gravio is a portable cold-atom interferometer
  designed to be operated from a moving vehicle (SUV today, drone roadmap), paired
  with an in-house AI interpretation layer (ORE-O) that turns gravity data into
  3D subsurface models. Customers are mining majors and energy explorers; a
  separate defence-oriented strand develops cold-atom inertial sensors for
  GPS-denied navigation with DSO National Laboratories.

