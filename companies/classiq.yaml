positioning: >
  Hardware-agnostic quantum software platform. Developers express algorithms
  as high-level functional models in Qmod; the Classiq synthesis engine
  compiles them into circuits optimised for a chosen backend (IBM, AWS
  Braket, Azure Quantum, IonQ, Quantinuum, Rigetti, Pasqal, OQC) under
  user-specified depth, width, and gate-count constraints. Founded in Tel
  Aviv in 2020 by Nir Minerbi, Yehuda Naveh, and Amir Naveh. Raised a USD
  110M Series C in May 2025 led by Entrée Capital, and added AMD Ventures, Qualcomm
  Ventures, and IonQ in a November 2025 strategic up-round, bringing
  cumulative funding above USD 200M.

modalities:
  software:
    products:
      - Classiq platform (Qmod modeling language + synthesis engine)
      - Classiq open library (Qmod function library)
      - NVIDIA CUDA-Q integration
      - AWS Marketplace listing

