logo:
  domain: qphox.eu

positioning: >
  TU Delft spin-out (Kavli Institute of Nanoscience) building
  piezo-optomechanical microwave-to-optical transducers — "Quantum Modems"
  that interface superconducting qubits with telecom-band optical fibre.
  Founded in 2020 by Simon Gröblacher, Robert Stockill, and Frederick
  Hijazi. Demonstrated the first optical readout of a superconducting qubit
  with Rigetti and Qblox in February 2025 (Nature Physics) and won a USD
  5.8M three-year AFRL contract with Rigetti later that year. Launched the
  Quantum Transducer as a commercial product in March 2026 with IBM named as
  first partner for distributed-quantum-computing testing.

