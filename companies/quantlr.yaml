slug: quantlr
# Slug retained for URL stability; the operating entity rebranded to
# HEQA Security in February 2024 (same legal entity).
name: HEQA Security (formerly QuantLR)
categories: [qkd]
hq: Modiin, Israel
founded: 2018
status: private
parent: null
logo:
  domain: heqa-sec.com

positioning: >
  Fibre-based QKD vendor (rebranded to HEQA Security in February 2024)
  positioned on cost: the LoQomo 1 packages a QKD transmitter, receiver, and
  key-management system into a single 1U enclosure, targeting telecom
  operators, data centres, critical infrastructure, and government. Founded
  in 2018 by Yanir Farber and Hagai Eisenberg as a Hebrew University of
  Jerusalem spin-out. Commercial deployments include the Israeli Ministry of
  Defense (with HUB Security) and an NVIDIA ConnectX-6 integration for
  Israeli data centres. Partnered with Singapore's SpeQtral to bridge
  terrestrial fibre QKD with satellite QKD.

modalities:
  qkd:
    protocol: [BB84, decoy-state]
    rate_distance: ""
    deployed_demos:
      - name: Israeli Ministry of Defense — quantum-secure cloud
        source_url: https://heqa-sec.com/blog/quantlr-partners-with-hub-to-secure-israeli-ministry-of-defense/
        note: With HUB Security; user identification and document encryption over public cloud using QKD-generated keys.
      - name: NVIDIA ConnectX-6 integration
        source_url: https://militaryembedded.com/cyber/cybersecurity/israeli-data-centers-secured-from-cyber-attacks-with-quantlr-and-nvidia
        note: QKD-generated keys delivered to NVIDIA ConnectX-6 NICs for Israeli data-centre protection; consortium funded by the Israel Innovation Authority and the Israel MoD DDR&D.
      - name: SpeQtral space-to-terrestrial Secure Quantum Node
        source_url: https://heqa-sec.com/blog/space-and-terrestrial-qkd-announcement/
        note: Joint development of a key-transfer node bridging SpeQtral satellite QKD with QuantLR terrestrial fibre QKD; funded by the Singapore-Israel Industrial R&D (SIIRD) Foundation.

