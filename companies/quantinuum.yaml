slug: quantinuum
name: Quantinuum
categories: [qc, software]
hq: Broomfield, Colorado, USA
founded: 2021
status: private
parent: honeywell
logo:
  domain: quantinuum.com

positioning: >
  Trapped-ion quantum computing built on a racetrack Quantum Charge-Coupled
  Device (QCCD) architecture, where ions are physically shuttled between
  trap zones to give all-to-all connectivity and high-fidelity two-qubit
  gates. Formed in 2021 from the merger of Honeywell Quantum Solutions and
  Cambridge Quantum; majority-owned by Honeywell. Sells H-Series systems
  (H1, H2, Helios) via cloud and on-premise, and ships InQuanto (quantum
  chemistry) and lambeq (quantum NLP) software stacks. Has published among the highest reported Quantum Volume figures across its H-Series generations and
  demonstrated, with Microsoft, logical qubits with error rates below their
  physical constituents.

modalities:
  qc:
    qubit_type: trapped-ion
    physical_qubits_current: 98
    logical_qubits_current: 48
    one_q_fidelity: 0.999975
    two_q_fidelity: 0.99921
    coherence_t1_ms: null
    coherence_t2_ms: null
    ec_code: qLDPC
    connectivity: all-to-all
    gate_set: []
  software:
    products:
      - InQuanto (quantum computational chemistry platform)
      - lambeq (quantum natural-language processing toolkit)
      - TKET (quantum compiler and circuit-optimisation SDK)

