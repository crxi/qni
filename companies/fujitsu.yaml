positioning: >
  Japanese IT conglomerate whose quantum-computing programme runs out of the
  RIKEN RQC-Fujitsu Collaboration Center (Wako, Saitama; established April
  2021) with RIKEN and NTT. The joint group built Japan's first domestically
  developed superconducting quantum computer (64 qubits, October 2023),
  followed by a 256-qubit machine (April 2025), with a 10,000-plus-qubit /
  250-logical-qubit system targeted for FY2030 under NEDO's Post-5G programme.
  Funding spans MEXT Q-LEAP, Cabinet Office Moonshot Goal 6, and NEDO. The
  separately marketed "Digital Annealer" is quantum-inspired CMOS hardware,
  not a quantum computer.

business_units:
  - name: RIKEN RQC-Fujitsu Collaboration Center
    scope: Superconducting transmon QC hardware (64 / 256 / 1000-qubit roadmap), jointly operated with RIKEN; NTT contributes qubit-control software
    hq: RIKEN Wako Campus, Saitama, Japan
    lead: Yasunobu Nakamura (Director; also Director, RIKEN Center for Quantum Computing)
  - name: Fujitsu Research — Quantum Laboratory
    scope: Hybrid quantum computing platform (40-qubit quantum simulator + superconducting hardware), STAR early-FTQC architecture, quantum software, diamond-spin-qubit R&D with Delft/QuTech
    hq: Kawasaki, Kanagawa, Japan
    lead: Vivek Mahajan (Fujitsu CTO; corporate sponsor)
  - name: Digital Annealer business
    scope: Quantum-INSPIRED classical Ising-model accelerator and cloud service for combinatorial optimisation; emulates qubits in a digital circuit, runs at room temperature — NOT a quantum computer
    hq: Kawasaki, Kanagawa, Japan
    lead: null

