slug: toshiba
name: Toshiba (Quantum Technology Division)
categories: [qkd]
hq: Cambridge, UK / Kawasaki, Japan
founded: 1991
status: private
parent: null
logo:
  domain: toshiba.eu

positioning: >
  Toshiba's quantum business runs across Toshiba Europe's Cambridge Research
  Laboratory (CRL) and Toshiba Corporation's R&D Center in Kawasaki, with
  Cambridge as the product-shipping hub. The Cambridge site, led by Andrew
  Shields, runs the commercial QKD product line — the Multiplexed MU and
  Long Distance LD systems — and the Twin-Field QKD research programme behind
  the Nature / Nature Photonics demonstrations; Kawasaki provides the
  corporate vehicle (taken private by Japan Industrial Partners in December
  2023). Flagship references: the BT–Toshiba London quantum-secured metro
  and the JPMorgan Chase / Ciena 800 Gbps co-existence trial.

business_units:
  - name: Toshiba Cambridge (Toshiba Europe Ltd, Cambridge Research Laboratory)
    scope: QKD product engineering (MU + LD systems), Twin-Field QKD demonstrations, BT London quantum-secured metro deployment, EuroQCI integration
    hq: Cambridge, UK
    lead: Andrew Shields (Head of Quantum Information Technologies)
    source_url: https://www.toshiba.eu/pages/eu/Cambridge-Research-Laboratory/quantum-information
  - name: Toshiba Corporate R&D Center (Toshiba Corporation)
    scope: Parent R&D; quantum-information theory and protocol work, corporate ownership of the Cambridge programme
    hq: Kawasaki, Japan
    lead: ""
    source_url: https://www.global.toshiba/ww/technology/corporate/rdc.html

modalities:
  qkd:
    protocol: [BB84, decoy-state, Twin-Field]
    rate_distance: "MU: >40 kb/s @ 10 dB (~50 km), 30 dB loss budget; LD: 300 kb/s @ 10 dB, 150 km+; TF-QKD: 600 km lab demo"
    deployed_demos:
      - BT–Toshiba London quantum-secured metro network (Docklands / City / M4 corridor), commercial trial launched 2022 with EY as first customer
      - JPMorgan Chase / Toshiba / Ciena — QKD multiplexed with 2x 800 Gbps + 8x 100 Gbps data channels over 70 km production-simulation fibre (2022)
      - National Composites Centre ↔ Centre for Modelling & Simulation (Bristol) — coherent / Twin-Field QKD over deployed telecom fibre (2025, with BT)
      - Quantum Corridor (US Midwest) — first cross-state QKD over live commercial metro fibre (2025)
      - 600 km Twin-Field QKD with dual-band stabilisation, Cambridge lab (Pittaluga et al. 2021)

