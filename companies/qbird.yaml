positioning: >
  Dutch quantum-secure communications start-up, spun out of QuTech (TU Delft
  / TNO) in January 2022. Q*Bird positions itself as the only commercial
  provider of Measurement-Device-Independent QKD (MDI-QKD). The Falqon®
  Series implements a hub-and-spoke, multi-node architecture in which a
  central measurement hub performs Bell-state measurements between end-node-
  emitted photons — removing all detector-side-channel vulnerabilities and
  letting many users share one hub. Early reference deployments span the
  Port of Rotterdam pilot, a 132 km cross-border Benelux link, and first
  national MDI-QKD networks in Spain (UPM Madrid) and Ireland (Walton/SETU).

modalities:
  qkd:
    protocol: [MDI-QKD, decoy-state]
    rate_distance: "Falqon hub-and-spoke MDI-QKD; demonstrated 132 km cross-border Benelux link (Arlon hub, ESA Redu and University of Luxembourg nodes); Madrid deployment runs 30–50 km from hub to each end node"
    deployed_demos:
      - note: Port of Rotterdam — described as the first scalable quantum network pilot; central hub installed in Eurofiber data centre, with Customs and nautical service providers added as end nodes. Consortium with Port of Rotterdam Authority, Single Quantum, Cisco, Eurofiber, Portbase, Intermax, InnovationQuarter under Quantum Delta NL.
        source_url: https://www.portofrotterdam.com/en/news-and-press-releases/consortium-parties-first-world-build-scalable-quantum-internet-connection
      - note: 132 km cross-border MDI-QKD link in the Benelux — four-node network with hub in Arlon (Belgium) connecting the University of Luxembourg QCI Lab in Kirchberg and ESA's Redu facility, with BeQCI (Belnet, imec, Ghent University) and LUQCIA.
        source_url: https://www.q-bird.com/press/fortifying-europes-quantum-communication-qbird-and-beqci-achieve-the-first-cross-border-mdi-qkd-link-in-benelux/
      - note: Spain's first multi-node MDI-QKD network — UPM-led Falqon deployment across two INTA sites and one Ministerio del Interior SGSICS site in Madrid; three end nodes, one centre hub, one optical switch, 30–50 km hub-to-node fibre.
        source_url: https://www.q-bird.com/press/leading-europes-quantum-frontier-upm-and-qbird-launch-spains-first-multi-node-mdi-qkd-network/
      - note: Ireland's first MDI-QKD network — with the Walton Institute (SETU) under IrelandQCI / EuroQCI; four end nodes (two Dublin data centres, DCU, Trinity College Dublin), centre hub at HEAnet/ASIERA, ESB Telecoms dark fibre.
        source_url: https://wordpress.waltoninstitute.ie/2026/03/26/irelands-quantum-leap-walton-institute-at-setu-and-qbird-deploy-irelands-first-qkd-network-with-expandable-architecture/
      - note: QUEST — expansion of the Port of Rotterdam pilot into South Holland with multiple interconnected hubs; Q*Bird-led with Single Quantum, Eurofiber, InnovationQuarter, funded by Quantum Delta NL, ERDF and Kansen voor West.
        source_url: https://www.q-bird.com/press/from-theory-to-network-what-sets-quest-apart/

