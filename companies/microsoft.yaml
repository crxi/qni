positioning: >
  Topological-qubit quantum-computing programme inside Microsoft Research, built
  on indium-arsenide / aluminium "topoconductor" heterostructures hosting Majorana
  zero modes. The dossier scopes the Microsoft Quantum division (led by Krysta
  Svore) and its Station Q condensed-matter lab in Santa Barbara; it excludes
  Microsoft's broader cloud, AI, and productivity businesses. The same division
  operates Azure Quantum, a hybrid cloud platform that brokers access to
  third-party hardware (IonQ trapped ions, Quantinuum H-series, Pasqal neutral
  atoms, Rigetti superconducting, plus others) alongside Microsoft's own
  topological roadmap.

business_units:
  - name: Microsoft Quantum
    scope: Topological-qubit hardware (Majorana 1 and successors), Q# / Azure Quantum software stack, DARPA US2QC fault-tolerant prototype design
    hq: Redmond, Washington, USA
    lead: Krysta Svore (Technical Fellow and Corporate Vice President, Advanced Quantum Development)
  - name: Microsoft Station Q
    scope: Condensed-matter theory and experiment for topological quantum computing; the long-running Majorana research programme
    hq: Santa Barbara, California, USA (UC Santa Barbara campus)
    lead: Chetan Nayak (Technical Fellow; Station Q scientific lead)

