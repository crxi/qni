logo:
  domain: qasky.com

positioning: >
  Qasky (安徽问天量子科技股份有限公司) is a Wuhu-based QKD and quantum security hardware company founded
  in 2009 as a joint venture between Wuhu City Construction Investment Co. and USTC, commercialising
  phase-encoding QKD research from the CAS Key Laboratory of Quantum Information. Products span QKD
  terminals, security gateways, key-management systems, optoelectronic modules, and QRNG chips, serving
  government, defence, finance, and power customers in China. Qasky holds State Cryptography
  Administration commercial-cipher licences and is a designated drafter of China's quantum cryptography
  national standards.

modalities:
  qkd:
    protocol: [BB84, decoy-state, phase-encoding]
    rate_distance: null
    deployed_demos:
      - note: >
          Wuhu metropolitan quantum access network (point-to-multipoint, 3 nodes) operated as
          part of the Hefei–Chaohu–Wuhu wide-area QKD network covering >150 km; ran >5,000
          hours from December 2011 to July 2012. Wang et al., Optics Express 22, 21739 (2014).
        source_url: https://arxiv.org/abs/1409.1568
      - note: >
          Wuhu municipal quantum government network (量子政务网) — world's first quantum-encrypted
          government communications network, put into trial operation May 2009.
        source_url: https://www.govtech.com/dc/articles/china-researchers-develop-a-quantum-cryptography.html
  enabling:
    products:
      - QKD terminal equipment (phase-encoding + decoy-state BB84)
      - Quantum security gateway
      - Quantum routing and switching equipment
      - Key-management systems and network operation/maintenance platforms
      - Core optoelectronic devices and modules
      - WT-QRNG300 quantum random number chip (quantum tunneling entropy source, LGA8 package 5.8×5 mm, State Cryptography Administration commercial-cipher certified, December 2024)
      - CCM3310SQ-T quantum security chip (co-developed with Suzhou China-Core, embeds WT-QRNG300 in a 32-bit security processor, QFN32 4×4 mm, GM/T 0008 Level 2, delivered Feb 2025)

