key_personnel:
  - role: Chairman
    name: Han Zhengfu (韩正甫)
    since: 2009
    source_url: https://jwc.njupt.edu.cn/2023/0421/c1596a239426/page.htm
    note: >
      Professor at USTC, doctoral supervisor; executive director of the China Cryptography
      Society; director of the Quantum Cryptography Professional Committee; member of the
      National Cryptography Industry Standards Committee. Co-founder and longstanding academic
      lead for the CAS Key Lab QKD programme commercialised by Qasky.
  - role: Academic Founder & Scientific Anchor
    name: Guo Guangcan (郭光灿)
    since: 2009
    source_url: https://www.cybersecurityintelligence.com/qasky-6906.html
    note: >
      Academician of the Chinese Academy of Sciences; pioneer of quantum information research
      in China. Co-founded Qasky; chairs the CAS Key Laboratory of Quantum Information at USTC.
      Not listed as a company executive but serves as academic authority at the academician
      workstation.
  - role: Chief Scientist (Academician Workstation)
    name: Cai Jiren (蔡吉人)
    since: 2009
    source_url: https://www.cybersecurityintelligence.com/qasky-6906.html
    note: >
      Well-known cryptographer and academician; heads one of the two academician teams
      (alongside Guo Guangcan's team) in Qasky's academician workstation of 12 members.

