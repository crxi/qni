positioning: >
  Quantum-control hardware and software vendor. Ships the OPX family of
  pulse-level controllers (OPX, OPX+, OPX1000) and the QUA programming
  language used to drive superconducting, trapped-ion, neutral-atom, and
  spin qubits; the installed base spans more than half of the organisations
  building quantum computers worldwide. Co-developed NVIDIA DGX Quantum
  (OPX1000 + Grace Hopper, sub-4 us round-trip) as a GPU-coupled
  quantum-control reference platform. Founded in Tel Aviv in
  2018 by Weizmann Institute alumni Itamar Sivan, Yonatan Cohen, and Nissim
  Ofek; closed a USD 170M Series C in February 2025 led by PSG Equity,
  taking cumulative funding to USD 280M.

modalities:
  enabling:
    products:
      - OPX1000 (modular high-density quantum controller, up to 64 output / 16 input channels in 3U)
      - OPX+ (ultra-fast quantum controller, predecessor generation)
      - OPX (original quantum-orchestration controller)
      - QDAC-II / QDAC-II Compact (ultra-low-noise DACs for spin-qubit control)
      - Octave (RF up/down-conversion to 18 GHz)
      - QSwitch, QBox (signal routing and breakout)
      - NVIDIA DGX Quantum (joint product: OPX1000 + Grace Hopper via PCIe, sub-4 µs round-trip)
  software:
    products:
      - QUA (pulse-level quantum-control programming language)
      - QUAlibrate (automated calibration framework)
      - OPX-Cloud / Orchestration Platform (hybrid quantum-classical control)

