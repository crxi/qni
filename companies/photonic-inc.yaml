positioning: >
  Silicon-spin-qubit quantum computing company building a distributed,
  fault-tolerant architecture around the T centre — a colour centre in
  silicon that emits telecom-band (1326 nm) photons natively, making each
  qubit its own repeater node. The pitch is "Entanglement First": scale by
  photonically linking many modest-size modules over standard telecom fibre
  rather than chasing a monolithic cryogenic interconnect. Founded in 2016
  as a Simon Fraser University spin-out by Stephanie Simmons and Paul Terry.
  Closed a >USD 200M financing round in May 2026 at a ~USD 2B valuation;
  Microsoft has been a strategic partner since 2023.

