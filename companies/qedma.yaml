logo:
  domain: qedma.com

positioning: >
  Noise-learning quantum-error-mitigation software for noisy gate-model
  quantum processors. Flagship product QESEM (Quantum Error Suppression and
  Error Mitigation) characterises a device's noise, suppresses some error
  classes during execution, and corrects the residual bias in
  post-processing; delivered as an IBM Qiskit Function and demonstrated on
  IBM Eagle and Heron devices. Founded in Tel Aviv in 2020 by Asif Sinay
  (CEO), Dorit Aharonov (Hebrew University), and Netanel Lindner (Technion).
  Closed a USD 26M Series A in July 2025 led by Glilot+ with IBM, TPY
  Capital, and Korea Investment Partners participating.

modalities:
  software:
    products:
      - QESEM (Quantum Error Suppression and Error Mitigation) — characterisation-based error-mitigation stack delivered as an IBM Qiskit Function and via Qedma cloud; targets utility-scale circuits on IBM Eagle (127-qubit) and Heron (133-qubit) devices
      - Noise-characterisation toolkit — standalone offering for fast device fingerprinting independent of the full mitigation pipeline

