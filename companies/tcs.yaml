hq: Mumbai, Maharashtra, India
founded: 1968
status: public
parent: null
logo:
  domain: tcs.com

positioning: >
  TCS's quantum programme sits inside TCS Research and the TCS Cybersecurity
  practice. As a large IT services firm rather than a hardware vendor, its
  quantum scope is advisory, integration, and applications software, running
  three threads: post-quantum cryptography migration advisory and third-party
  QKD integration (partners include Quantum Bridge and Toshiba); the TCS
  Quantum Computing Lab on AWS Braket; and the May 2025 IBM / TCS / Andhra
  Pradesh agreement to deploy an IBM Quantum System Two at the Amaravati
  Quantum Valley Tech Park. Does not build photonic sources, detectors,
  memories, or QKD endpoints.

