shareholders:
  - holder: China Telecom Quantum Information Technology Group Co., Ltd. (中电信量子信息科技集团)
    stake_percent: 23.1
    stake_class: controlling
    as_of: 2025-01
    source_url: https://www.caixinglobal.com/2024-03-13/china-telecom-unit-to-acquire-majority-stake-in-quantumctek-for-265-million-102174660.html
    note: >
      Acquired 24.1M newly issued shares at CNY 78.94/share (~RMB 1.9B / USD 265M)
      via private placement in 2024, registered as controlling shareholder January 2025.
      Combined with voting-rights agreement with USTC and former chair Peng Chengzhi
      this represents 41.4% of voting rights. China Telecom Quantum is a wholly-
      owned subsidiary of China Telecom Corporation Limited; ultimate controller is
      SASAC of the State Council.
  - holder: University of Science and Technology of China (USTC, via USTC Asset Management / 国科大资产)
    stake_percent: null
    stake_class: strategic
    as_of: 2025-01
    source_url: https://www.marketscreener.com/quote/stock/QUANTUMCTEK-CO-LTD-111379905/company/
    note: >
      Was the largest shareholder (~18% pre-2025) before China Telecom Quantum's
      private placement. Now a minority strategic shareholder; voting rights for
      part of its stake assigned to China Telecom Quantum under the 2024 pact.
  - holder: Peng Chengzhi (彭承志, founder)
    stake_percent: null
    stake_class: founder
    as_of: 2025-01
    source_url: https://www.caixinglobal.com/2024-03-13/china-telecom-unit-to-acquire-majority-stake-in-quantumctek-for-265-million-102174660.html
    note: >
      Co-founder and former Chairman; transferred voting rights of his personal
      stake to China Telecom Quantum as part of the 2024 control transaction;
      remains Chief Scientist.

