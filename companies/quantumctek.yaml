positioning: >
  QuantumCTek (国盾量子) is China's largest publicly-listed commercial QKD vendor by deployed network footprint and the
  hardware supplier behind the national quantum-secure communication backbone.
  Spun out of Pan Jianwei's University of Science and Technology of China
  (USTC) group in Hefei in 2009, it listed on the Shanghai STAR Market in
  July 2020 (688027) as China's first publicly traded quantum company.
  Its decoy-state BB84 terminals equip the Beijing–Shanghai trunk, metro QKD
  networks, and the Micius satellite ground stations. Product range also
  covers QRNGs, quantum-secure VPN gear, single-photon detectors, key-
  management systems, and (since 2022) superconducting quantum computers.

modalities:
  qkd:
    protocol: [BB84, decoy-state, polarisation-coding, phase-coding, time-bin]
    rate_distance: "QKD-PHA300: ~50 kbps @ 10 dB loss, ~1 kbps @ 22 dB loss (decoy-state phase/time-bin BB84); QKD-POL1250 polarisation series used in Beijing–Shanghai backbone with 32 trusted-node relays over ~2,000 km"
    deployed_demos:
      - note: Beijing–Shanghai quantum backbone (~2,000 km, 32 trusted nodes) — QuantumCTek QKD terminals deployed across the trunk
        source_url: https://www.nature.com/articles/s41586-020-03093-8
      - note: Integrated space-to-ground QKD network, ~4,600 km (Chen et al., Nature 589, 214–219, 2021) — QuantumCTek hardware in the fibre backbone plus Xinglong / Nanshan ground stations for Micius links
        source_url: https://www.nature.com/articles/s41586-020-03093-8
      - note: Hefei metropolitan quantum-secure communication trial network (2011, expanded to 46-node Hefei MAN demonstrated in npj QI 7, 134, 2021)
        source_url: https://www.nature.com/articles/s41534-021-00474-3
      - note: Jinan government QKD network (2017) — 32 nodes (1 control + 8 trusted relays + 23 end-user), 8,000 km² coverage; QuantumCTek supplied QKD systems and network design
        source_url: https://www.quantum-info.com/English/case/2017/0901/339.html
      - note: Wuhan metropolitan QKD network and Wuhan–Hefei backbone extension (Nov 2018) linking the Wuhan MAN to the Beijing–Shanghai trunk
        source_url: https://www.quantum-info.com/English/case/2017/0901/339.html
      - note: Carrier-grade quantum communication network over >10,000 km (npj QI 11, 2025) — QuantumCTek terminals across China Telecom's operational network
        source_url: https://www.nature.com/articles/s41534-025-01089-8
  qc:
    qubit_type: transmon
    physical_qubits_current: 100
    logical_qubits_current: 0
    one_q_fidelity: null
    two_q_fidelity: null
    coherence_t1_ms: null
    coherence_t2_ms: null
    ec_code: null
    connectivity: nearest-neighbour
    gate_set: []
  enabling:
    products:
      - QKD-POL1250-S series (A transmit / B receive) — polarisation-encoded decoy-state BB84
      - QKD-PHA300 series (A / B) — phase / time-bin decoy-state BB84
      - QRNG modules (chip-, board-, and appliance-level)
      - Quantum-secure VPN, switching, and key-management systems
      - Single-photon detectors (InGaAs / SNSPD)
      - Cold-atom gravimeters
      - Superconducting quantum computer systems (25-qubit export configuration, 100+ qubit domestic platform)

