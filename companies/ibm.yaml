roadmap:
  - target: 2026
    item: Nighthawk-class processors delivering ~7,500 two-qubit gates, demonstrating practical quantum advantage
    source_url: https://www.ibm.com/quantum/blog/qdc-2025
    tag: qc
  - target: 2026
    item: Kookaburra — first modular processor combining quantum memory and logic operations
    source_url: https://newsroom.ibm.com/2025-06-10-IBM-Sets-the-Course-to-Build-Worlds-First-Large-Scale,-Fault-Tolerant-Quantum-Computer-at-New-IBM-Quantum-Data-Center
    tag: qc
  - target: 2027
    item: Cockatoo — two Kookaburra modules entangled via L-couplers (chip-to-chip)
    source_url: https://newsroom.ibm.com/2025-06-10-IBM-Sets-the-Course-to-Build-Worlds-First-Large-Scale,-Fault-Tolerant-Quantum-Computer-at-New-IBM-Quantum-Data-Center
    tag: qc
  - target: 2028
    item: Nighthawk-based systems supporting ~15,000 two-qubit gates over 1,000+ connected qubits via long-range couplers
    source_url: https://www.ibm.com/quantum/blog/qdc-2025
    tag: qc
  - target: 2029
    item: Quantum Starling — 200 logical qubits, 100 million quantum gate operations; large-scale fault-tolerant system at Poughkeepsie quantum data centre
    source_url: https://www.ibm.com/roadmaps/quantum/2029/
    tag: qc
  - target: 2030
    item: Initial proof-of-concept demonstration of multiple networked quantum computers (with Cisco, Fermilab/SQMS)
    source_url: https://newsroom.ibm.com/2025-11-20-ibm-and-cisco-announce-plans-to-build-a-network-of-large-scale,-fault-tolerant-quantum-computers
    tag: network
  - target: "early-2030s"
    item: Networked large-scale fault-tolerant quantum computers via Quantum Networking Units (QNUs) with microwave-optical transducers
    source_url: https://newsroom.ibm.com/2025-11-20-ibm-and-cisco-announce-plans-to-build-a-network-of-large-scale,-fault-tolerant-quantum-computers
    tag: network
  - target: "late-2030s"
    item: Quantum computing internet — distributed quantum computers, sensors and communications
    source_url: https://newsroom.ibm.com/2025-11-20-ibm-and-cisco-announce-plans-to-build-a-network-of-large-scale,-fault-tolerant-quantum-computers
    tag: network
  - target: "post-2033"
    item: Blue Jay — 2,000 logical qubits, 1 billion gate operations
    source_url: https://newsroom.ibm.com/2025-06-10-IBM-Sets-the-Course-to-Build-Worlds-First-Large-Scale,-Fault-Tolerant-Quantum-Computer-at-New-IBM-Quantum-Data-Center
    tag: qc

