positioning: >
  Superconducting-transmon quantum computing programme inside IBM Research,
  with a published 2029 fault-tolerance target — Quantum Starling at 200
  logical qubits and 100 million gate operations — and a parallel
  modular-quantum-networking effort announced with Cisco and Fermilab/SQMS
  in November 2025. Flagship Nighthawk (120 qubits, square lattice, 218
  tunable couplers, 350 us median T1) and the qLDPC-prototype Loon chip were
  unveiled at the November 2025 Developer Conference. The Bravyi 2024 Nature
  qLDPC result (Bivariate Bicycle codes) underpins the path through
  Kookaburra and Cockatoo to Starling and a post-2033 Blue Jay system.

business_units:
  - name: IBM Quantum
    scope: Superconducting QC hardware, Qiskit stack, IBM Quantum Network cloud
    hq: Yorktown Heights, New York / Poughkeepsie quantum data centre
    lead: Jay Gambetta (Director, IBM Research; previously VP IBM Quantum)
  - name: IBM Quantum Networking (with Fermilab/SQMS, Cisco)
    scope: Microwave-optical transducers, Quantum Networking Units (QNUs), modular interconnect
    hq: Yorktown Heights / Fermilab (Batavia, IL)
    lead: Jerry Chow (IBM Fellow; quantum infrastructure)

