positioning: >
  Delft Circuits manufactures cryogenic I/O cabling for quantum computers, specifically
  the Cri/oFlex® family of superconducting flex cables that carry microwave control and
  readout signals into dilution refrigerators. The cables use polyimide Kapton® substrates
  with silver or superconducting NbTi conductors and integrate attenuation and filtering
  directly into the flex assembly, replacing dense coaxial cable bundles at higher channel
  density and lower thermal load. Primary customers are quantum-computing hardware builders,
  dilution-refrigerator manufacturers, and cryogenic research laboratories. Founded in 2017
  as a TU Delft spin-off by Daan Kuitenbrouwer and Sal Jua Bosman; the company has grown
  to 50+ staff and operates an in-house Quantum Fab cleanroom in Delft.

modalities:
  enabling:
    products:
      - "Cri/oFlex® 2 — 8-channel superconducting flex cable; stripline NbTi on Kapton®; integrated filtering and attenuation; 0.3 mm thickness per cable"
      - "Cri/oFlex® 3 / CF3-X — fully filtered monolithic flex cable (launched 2023); integrated attenuators across temperature stages"
      - "Cri/oFlex® loaders — modular cage assemblies delivering up to 256 channels per loader in current generation (1,024 projected 2027; 4,096 projected 2029)"
      - "Custom flex solutions — application-specific line types (flux bias, microwave drive, signal, readout)"

