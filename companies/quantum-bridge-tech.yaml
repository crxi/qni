positioning: >
  University-of-Toronto spin-out commercialising Distributed Symmetric Key
  Exchange (DSKE) — a quantum-safe key-distribution scheme aimed at telecom
  and enterprise networks. Founded by Hoi-Kwong Lo (UofT, twin-field QKD)
  and Mattia Montagna; product positioning is networking-software for
  quantum-safe key delivery rather than dedicated QKD endpoint hardware.
  Partnered with Juniper Networks (Beyond Labs) under a strategic investment
  in August 2024 and has received non-dilutive Canadian federal funding
  (NRC, ISED).

