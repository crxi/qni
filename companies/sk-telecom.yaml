hq: Seoul, South Korea
founded: 1984
status: public
parent: null
logo:
  domain: sktelecom.com

positioning: >
  South Korea's largest mobile carrier (KOSPI:017670, NYSE:SKM) and the
  operator-side anchor of Korea's commercial quantum-network programme.
  This dossier covers SKT's *own* quantum activities — its Quantum Tech Lab
  (est. 2011), the QKD overlay deployed on its commercial 5G/LTE backbone
  by SK Broadband, the QRNG integration into the Samsung Galaxy Quantum
  line, and SKT's ITU-T/ETSI standardisation work — not the underlying
  hardware, which is supplied by ID Quantique (separate dossier;
  formerly an SKT/SK Square subsidiary, controlling stake transferred to
  IonQ in May 2025). SKT is now a strategic partner of both IDQ and IonQ
  via a ~3.1% IonQ equity position taken in the same transaction.

business_units:
  - name: Quantum Tech Lab
    scope: Internal R&D arm established 2011; develops QKD/QRNG integration into telecom infrastructure, leads SKT's standardisation contributions, and drives the QKD+PQC hybrid key-management agenda
    hq: Seoul, South Korea
    lead: ""
    source_url: https://news.sktelecom.com/en/853
  - name: SK Broadband
    scope: Wholly-owned fixed-line subsidiary; operates the deployed nationwide QKD overlay (Seoul-Daejeon-Daegu trunk, 48-agency government network) using IDQ Cerberis hardware
    hq: Seoul, South Korea
    lead: ""
    source_url: https://www.idquantique.com/idq-and-sk-broadband-complete-phase-one-of-nation-wide-korean-qkd-network/

modalities:
  qkd:
    protocol: [BB84, decoy-state]
    rate_distance: "10 kbps secure key rate over 50 km dedicated quantum channel; AES-256 line encryption multiplexed to 120 Gbps in commercial deployment"
    deployed_demos:
      - note: Seoul-Daejeon-Daegu 5G/LTE backbone — ~330 km QKD overlay on SKT's most data-heavy commercial section (2019)
        source_url: https://www.idquantique.com/sk-telecom-continues-to-protect-its-5g-network-with-quantum-cryptography-technologies/
      - note: Bundang-Junggu switching-centre link inside Seoul — first production-traffic QKD encryption on a commercial mobile network
        source_url: https://www.idquantique.com/sk-telecom-continues-to-protect-its-5g-network-with-quantum-cryptography-technologies/
      - note: Nationwide QKD network for the Korean government — 800 km converged backbone connecting 48 government agencies across 27 QKD links, three rings, one daisy chain, 10 trusted relays; operated by SK Broadband with IDQ
        source_url: https://www.idquantique.com/idq-and-sk-broadband-complete-phase-one-of-nation-wide-korean-qkd-network/
      - note: Smart-power-plant 5G quantum-cryptography pilot (with KOSPO) — first industrial-control deployment in Korea
        source_url: https://www.idquantique.com/id-quantique-and-sk-telecom-announce-the-first-smart-power-plant-secured-by-5g-quantum-cryptography/
      - note: DGB Daegu Bank mobile-banking service secured end-to-end with QKD-derived keys
        source_url: https://news.sktelecom.com/en/1233
      - note: Equinix–SKT inter-data-centre QKD service for enterprise customers in Korea
        source_url: https://www.datacenterdynamics.com/en/news/equinix-and-sk-telecom-to-provide-quantum-cryptography-between-data-centers/
  network:
    role: operator
    products: []
  enabling:
    products:
      - Galaxy Quantum series — Samsung 5G handsets bundled with IDQ Quantis QRNG chip and SKT services (T-ID 2FA, SK Pay biometric auth, mobile e-certification); Galaxy A Quantum (2020), Quantum 2 (2021), Quantum 3 (2022), Quantum 4 (2023), Quantum 5 (Aug 2024)
      - QKD+PQC hybrid key-management framework — SKT-led ITU-T contribution combining QKD-secured trunk sections with PQC-secured access sections under one key-management plane

milestones:
