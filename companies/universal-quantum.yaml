logo:
  domain: universalquantum.com

positioning: >
  University of Sussex spin-out building modular trapped-ion quantum
  computers based on ytterbium-171 ions and silicon-microchip ion traps.
  Moves ions between modules via electric fields rather than photonic links
  — chip-to-chip ion shuttling under extreme-high vacuum — targeting
  fault-tolerant scale through copy-paste tiling of small modules. Founded
  in 2018 by Winfried Hensinger and Sebastian Weidt. Anchor contract is a
  EUR 67M four-year programme awarded by Germany's DLR in 2022 to deliver a
  fully scalable trapped-ion quantum computer at DLR Hamburg, scaling toward
  the ~100-qubit class.

