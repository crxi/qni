logo:
  domain: speqtralquantum.com

positioning: >
  Singapore-based satellite-QKD vendor commercialising entangled-photon QKD
  payloads spun out of the Centre for Quantum Technologies (CQT) at the
  National University of Singapore. Operated the SpooQy-1 3U CubeSat
  (deployed from the ISS in 2019) as the technology pathfinder; flying the
  SpeQtre 6U-class entangled-photon-source demonstrator (deployed November
  2025); building SpeQtral-1, a commercial QKD-pathfinder LEO satellite on a
  Kongsberg NanoAvionics bus with an Mbryonics 10 cm optical terminal,
  targeting BB84 and BBM92 protocols.

modalities:
  qkd:
    protocol: [BB84, BBM92]
    rate_distance: "Entanglement-based (BBM92) and prepare-and-measure (BB84) downlinks from LEO; SpeQtre carries a space-qualified entangled-photon-pair source; SpeQtral-1 increases optical aperture to 10 cm vs SpeQtre"
    deployed_demos:
      - "SpooQy-1 — 3U CubeSat, polarization-entangled-pair source demonstrated in orbit (CQT-built, operations handed to SpeQtral)"
      - "SpeQtre — entanglement-based QKD demonstrator satellite carrying SpeQtral's source + detector modules (deployed Nov 2025, sun-synchronous orbit)"
  network:
    role: testbed
    products:
      - "SpeQtral-1 (in development) — commercial QKD pathfinder LEO satellite"
      - "Ground-based QKD systems for terrestrial deployments (Asia-Pacific partnerships)"

