slug: origin-quantum
name: Origin Quantum
categories: [qc, software]
hq: Hefei, Anhui, China
founded: 2017
status: private
parent: null
logo:
  domain: originqc.com.cn

positioning: >
  Hefei-based superconducting quantum-computing vendor (本源量子) spun out
  of the CAS Key Laboratory of Quantum Information at USTC in September 2017
  by Guo Guangcan and Guo Guoping. Full-stack vertically integrated programme
  covering the QPU (Wuyuan → Wukong → Wukong-180 chip families), the Tianji
  measurement-and-control electronics, the Origin Pilot OS, and the Origin
  Quantum Cloud service. Positioned as China's domestically controllable
  superconducting QC champion and the country's QC counterpart to QuantumCTek.
  Initiated A-share STAR-Market IPO counselling in September 2025 at an
  implied valuation of ~CNY 6.9 B.

modalities:
  qc:
    qubit_type: transmon
    physical_qubits_current: 180
    logical_qubits_current: 0
    one_q_fidelity: 0.999
    two_q_fidelity: 0.99
    coherence_t1_ms: 0.040
    coherence_t2_ms: 0.020
    ec_code: null
    connectivity: tunable-coupler (single-chip, 251 coupling qubits on Wukong-180)
    gate_set: []
  software:
    products:
      - Origin Pilot — quantum-classical-AI integrated operating system (v4.0 open-source download, Feb 2026)
      - Origin Quantum Cloud — global cloud access to Wukong / Wukong-180 QPUs
      - QPanda — open-source quantum-programming framework

