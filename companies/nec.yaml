    scope: QKD systems, CV-QKD hardware, quantum-cryptography network engineering, Tokyo QKD Network link no. 2
    hq: Kawasaki / Tsukuba, Japan
    lead: ""
    source_url: https://www.nec.com/en/global/rd/
  - name: NEC-AIST Quantum Technology Cooperative Research Laboratory
    scope: Superconducting-qubit hardware integration (Moonshot Goal 6), CV-QKD components
    hq: Tsukuba, Japan
    lead: Tsuyoshi Yamamoto (Research Fellow; Moonshot Goal 6 Project Manager)
    source_url: https://www.nec.com/en/global/rd/special/202109/index.html

modalities:
  qkd:
    protocol: [BB84, decoy-state, CV-QKD]
    rate_distance: "Tokyo QKD link no. 2 (2010): 45 km Koganei–Otemachi, 1.25 GHz clock, decoy-state BB84 with WDM, NICT SSPDs; current product line: CV-QKD on standard SMF (specific rate-distance numbers not published in a peer-reviewed source)"
    deployed_demos:
      - Tokyo QKD Network (2010) — NEC operated link no. 2 (Koganei–Otemachi, 45 km, decoy-state BB84 with WDM, 1.25 GHz clock) alongside NTT-NICT, Mitsubishi Electric, Toshiba and EU partners
      - NEC / NICT / ZenmuTech (2020) — quantum-cryptography-secured transmission and secret-sharing backup of dummy electronic medical records over a wide-area QKD network
      - NEC / NICT / Nomura Holdings / Nomura Securities / Toshiba / NICT (2020-12 → 2022-01) — joint verification of QKD-protected FIX-format financial-transaction data; Tokyo QKD Network extended into Nomura Securities premises
      - Mitsui & Co. / Quantinuum / NEC (2024-11) — first quantum-tokens demonstration in a commercial-style setting, 10 km Tokyo fibre, NEC-provided commercial QKD equipment
      - NICT / Toshiba / NEC (2025-07) — first multiplexed transmission of two distinct QKD signals (Toshiba BB84 + NEC CV-QKD) and high-speed data over the same C+L-band ROADM section, built on NEC SpectralWave WX series for the IOWN Open APN

