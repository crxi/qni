positioning: >
  Japanese IT conglomerate whose quantum programme runs out of the Secure
  System Platform Research Laboratories and the NEC-AIST Quantum Technology
  Cooperative Research Laboratory. NEC was one of the four original Japanese
  operators of the NICT-led Tokyo QKD Network in 2010, supplying a 1.25 GHz
  decoy-state BB84 link with WDM multiplexing on the 45 km Koganei–Otemachi
  loop. Commercial focus is continuous-variable QKD (CV-QKD) for in-band
  multiplexing of QKD with classical data over standard telecom fibre. NEC
  also leads the superconducting-qubit hardware-integration project inside
  Japan's Cabinet Office Moonshot Goal 6 programme.

business_units:
