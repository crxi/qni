      - note: 800 km nationwide QKD backbone in South Korea with SK Broadband / SKT
        source_url: https://www.idquantique.com/id-quantique-and-sk-telecom-announce-the-worlds-first-5g-smartphone-equipped-with-a-quantum-random-number-generator-qrng-chipset/
      - note: Slovakia's first national quantum communication network (EuroQCI), all QKD hardware supplied by IDQ
        source_url: https://www.idquantique.com/ionq-slovakias-quantum-communication-network/
      - note: ESA EAGLE-1 and E2EQSS satellite-QKD subsystems
        source_url: https://www.idquantique.com/ionq-slovakias-quantum-communication-network/
  source-detect:
