slug: id-quantique
name: ID Quantique
categories: [qkd, source-detect, enabling]
hq: Geneva, Switzerland
founded: 2001
status: acquired
parent: ionq
logo:
  domain: idquantique.com

positioning: >
  A commercial QKD vendor founded in 2001, among the earliest in the field,
  spun out of the University of Geneva by Nicolas Gisin, Grégoire Ribordy,
  Hugo Zbinden, and Olivier Guinnard. Sells turnkey fibre-QKD systems (Cerberis and Clavis XG,
  with the 4th-generation Clavis XG reaching ~14,000 AES-256 keys/hour at 24
  dB loss over up to 150 km of SMF), single-photon detectors (ID230 InGaAs,
  ID281 SNSPD), and Quantis QRNG chips embedded in Samsung Galaxy "Quantum"
  phones. Founding member of ETSI ISG-QKD and supplier of the QKD hardware
  for Slovakia's EuroQCI rollout. Acquired by SK Telecom (majority stake,
  2018) and then by IonQ (controlling stake, May 2025).

modalities:
  qkd:
