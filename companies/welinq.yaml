positioning: >
  Quantum-networking hardware vendor commercialising laser-cooled rubidium
  quantum memories and entangled-photon sources as rack-mount appliances
  for distributed quantum computing. Spun out of Laboratoire Kastler Brossel
  (Sorbonne Universite / CNRS / ENS-PSL) on roughly two decades of cold-atom
  ensemble work in Julien Laurat's group. Positions its flagship QDrive
  memory as the interconnect layer for neutral-atom and photonic quantum
  processors, with development partnerships at Pasqal and Quandela and
  first deployments inside the EuroQCI national-testbed perimeter.

