positioning: >
  Qblox B.V. designs and manufactures the Cluster, a modular 19" rack quantum
  control system for qubit control and readout, sold to academic laboratories and
  quantum hardware builders worldwide. The Cluster is platform-agnostic,
  supporting superconducting, spin-qubit, and colour-centre (NV) systems over a
  frequency range up to 18.5 GHz via hot-swappable modules and the proprietary
  SYNQ synchronisation protocol. A QuTech / TU Delft spin-out founded in Delft
  in 2019 by Niels Bultink and Jules van Oven, the company reached more than 100
  customers before raising its first equity round, a €24.2 M ($26 M) Series A in
  June 2024. A North America hub opened in Boston in June 2025 and US
  manufacturing via Prodrive Technologies in Canton, Massachusetts began April
  2026.

modalities:
  enabling:
    products:
      - "Cluster (modular 19\" rack system, up to 20 module slots, up to 120 Q1 sequence processor cores per rack)"
      - QCM — Qubit Control Module (0–400 MHz, 4 output channels)
      - QCM-RF II — Qubit Control Module RF II (2–18.5 GHz)
      - QRM — Qubit Readout Module (0–400 MHz, 2 in / 2 out channels)
      - QRM-RF — Qubit Readout Module RF (2–18.5 GHz)
      - QRC — High-density Qubit Readout & Control (100 MHz–10 GHz, RFSoC-based)
      - QTM — Qubit Timetag Module (photon counting / time-tagging, 20 ps resolution, 8 digital I/O)
      - QSM — Quantum Source & Measurement Module (DC channels)
      - Q1ASM (low-level pulse-sequence programming language)
      - Qblox Scheduler (Python-based control framework)

