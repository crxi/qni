logo:
  domain: ionq.com

positioning: >
  Trapped-ion quantum computing systems sold through cloud platforms (AWS Braket,
  Azure Quantum, GCP) and as on-premise installations. A publicly traded
  (NYSE, 2021) pure-play trapped-ion vendor with cloud and on-premise sales
  channels. Since 2024 IonQ has
  been rolling up the adjacent networking and photonics stack — acquiring Qubitekk
  (2024, entanglement-distribution testbeds), ID Quantique (May 2025, QKD + SNSPDs),
  Lightsynq (2025, photonic interconnects), and Oxford Ionics (2025, ion-trap chip
  fabrication) — positioning itself as a vertically integrated quantum-computing +
  quantum-networking company rather than ions-only.

