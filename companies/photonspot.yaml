slug: photonspot
name: Photon Spot
categories: [source-detect, enabling]
hq: Monrovia, California, USA
founded: 2009
status: private
parent: null
logo:
  domain: photonspot.com

positioning: >
  US single-photon-detection vendor selling superconducting-nanowire
  single-photon-detector (SNSPD) systems and sub-Kelvin cryogenic packages
  to quantum-information, deep-space-optical-comms, and instrumentation
  customers. Founded in 2009 by Vikas Anant and bootstrapped on product
  sales and R&D contracts. Longstanding NASA/JPL supplier, with SNSPDs flown
  on the Deep Space Optical Communications demonstration and the Artemis II
  laser-comm system. Flagship Eos-series fibre-coupled SNSPDs report >95%
  system detection efficiency at 1550 nm. Competes with Single Quantum and
  IDQ; NIST CHIPS Act award funds a large-format SNSPD camera cryostat.

