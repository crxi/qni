positioning: >
  Australian-German quantum-computing company spun out of the Australian
  National University (ANU) in 2019. Builds nitrogen-vacancy (NV) colour-
  centre processors in synthetic diamond that operate at room temperature,
  removing the dilution-refrigerator footprint and enabling rack-mount or
  edge-deployable quantum accelerators. European headquarters in Stuttgart,
  Germany. Flagship deployment is the on-premises NV diamond accelerator at
  the Pawsey Supercomputing Centre in Perth, described by the company as
  the first room-temperature quantum computer installed at a major HPC
  facility (2022). Sells the Qristal
  software development kit alongside the diamond processor module.

