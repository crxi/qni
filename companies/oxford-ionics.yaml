logo:
  domain: oxionics.com

positioning: >
  Trapped-ion quantum computing built on silicon-CMOS chips with on-chip
  electronic ion control (EIC) — integrated microwave antennae replace the
  bulk laser stacks normally used to drive trapped-ion gates, enabling
  copy-paste scaling using existing semiconductor manufacturing. Spun out of
  the David Lucas / Chris Ballance ion-trap group at the University of
  Oxford in 2019 by Chris Ballance and Tom Harty. Reports 99.9992%
  single-qubit and 99.99% two-qubit gate fidelities on a chip-trap Ca+
  system without ground-state cooling (arXiv 2510.17286). Acquired by IonQ
  in September 2025 for ~USD 1.075B.

