positioning: >
  French full-stack photonic quantum-computing company founded in 2017 as a
  CNRS / Université Paris-Saclay (C2N) spin-out by Pascale Senellart,
  Niccolò Somaschi, and Valérian Giesz. Builds discrete-variable photonic
  processors driven by deterministic semiconductor-quantum-dot single-photon
  sources in micropillar cavities — technology developed in Senellart's
  group at C2N. Sells the MosaiQ photonic QC line (6 to 24 qubits) and the
  Prometheus single-photon source. Delivered what the company described as
  Europe's first customer-installed photonic QC to OVHcloud in 2023; the 12-qubit Lucy was
  inaugurated at CEA's TGCC in April 2026 under EuroHPC / GENCI.

