hq: London, UK
founded: 2017
status: public
parent: null
logo:
  domain: arqit.uk

positioning: >
  London-listed (NASDAQ: ARQQ) quantum-safe cryptography vendor selling
  QuantumCloud — a cloud-delivered Symmetric Key Agreement (SKA) platform-as-
  a-service for enterprise and defence customers. Originally founded in 2017 to
  build a global satellite QKD network ("QKDSat") in partnership with ESA and
  Virgin Orbit; pivoted away from satellite delivery in December 2022 after
  reclassifying the partly-built satellite as held for sale. The current product
  is software-only and does not use quantum hardware to generate or distribute
  keys.

