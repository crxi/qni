logo:
  domain: alice-bob.com

positioning: >
  Superconducting quantum-computing hardware built on cat qubits — bosonic qubits
  encoded in a microwave cavity that autonomously suppress bit-flip errors, leaving
  mainly phase-flips for an outer error-correction code to handle. Founded in 2020 by
  two QUANTIC-trained physicists and headquartered in Paris with a Boston office, the
  company spun out of work with Mines Paris–PSL, ENS, and Inria. It targets fault-tolerant
  machines with fewer physical qubits per logical qubit than uncorrected-transmon
  approaches, and offers cat-qubit chips through Google Cloud to early-access researchers
  and enterprises tracking the fault-tolerant roadmap.

