logo:
  domain: lquom.com

positioning: >
  Quantum-repeater technology startup spun out of Tomoyuki Horikiri's lab at
  Yokohama National University in 2020. Productises a cavity-enhanced
  entangled-photon source matched to Pr:YSO rare-earth quantum memory at 606
  nm for long-distance quantum communication. Sells the LQ-PS-100 two-photon
  source and runs joint R&D programmes with Japanese telcos and integrators
  (SoftBank, Toshiba, Anritsu). Demonstrated entangled-photon quantum
  communication across the Tokyo metropolitan area with SoftBank in 2023;
  closed a Series B in October 2025 led by SBI Investment and signed a
  long-distance-QKD joint research agreement with Toshiba in March 2026.

