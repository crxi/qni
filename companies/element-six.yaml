slug: element-six
name: Element Six
categories: [enabling, memory]
hq: Didcot, Oxfordshire, UK
founded: 1946
status: private
parent: de-beers-group
logo:
  domain: e6.com

positioning: >
  Element Six is the synthetic-diamond foundry of the De Beers Group,
  designing and manufacturing CVD- and HPHT-grown diamond with controlled
  defect content. Supplies the substrates that solid-state quantum programmes
  built on NV (nitrogen-vacancy) and SiV (silicon-vacancy) colour centres
  depend on, via the DNV-B1 / DNV-B14 ensemble product lines and electronic-
  grade single-crystal diamond for single-defect work in quantum-memory and
  repeater nodes. Supplies substrates to multiple diamond-defect quantum-networking programmes,
  including QuTech, Harvard, Lightsynq (equity stake Nov 2024), IonQ, AWS,
  and Quantum Brilliance. Does not build quantum end-systems itself.

modalities:
  enabling:
    products:
      - DNV-B1 (single-crystal CVD diamond, low-density NV ensembles)
      - DNV-B14 (single-crystal CVD diamond, high-density NV ensembles, ~10x NV density vs DNV-B1)
      - Electronic-grade single-crystal CVD diamond (for single-defect NV / SiV qubits)
      - Quantum-grade diamond thin films bonded onto silicon / silicon-nitride substrates (joint product with IonQ, 2025)
  memories:
    platform: nv / siv (substrate supplier; Element Six provides the host material, not the qubit device)
    storage_time_ms: null
    retrieval_efficiency: null
    fidelity: null
    wavelength_nm: null
    mode_capacity: null

