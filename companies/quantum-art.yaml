positioning: >
  Israeli trapped-ion quantum-computing company spun out of the Weizmann
  Institute ion-trap group in 2022. Builds full-stack systems on multi-core
  ion chains with dynamic optical segmentation and native multi-qubit gates,
  reporting a 200-ion fully controlled linear chain as its 2025 technical
  milestone. Roadmap targets a 1,000-qubit "Perspective" system for quantum
  advantage, scaling toward a third-generation 2D multi-core architecture.
  Closed a USD 100M Series A in December 2025 led by Bedford Ridge Capital,
  extended to USD 140M in April 2026.

