logo:
  domain: qnulabs.com

positioning: >
  India's first commercial quantum-safe cybersecurity vendor. Incubated at IIT
  Madras Research Park in 2016 and headquartered in Bengaluru, QNu Labs ships a
  trio of quantum-security products: Tropos (laser-based QRNG, ~100 Mbps,
  NIST SP 800-90B), Armos (fibre-QKD with a decoy-state Differential Phase
  Shift protocol, ~200 km / 40 dB loss budget), and Hodos (post-quantum
  cryptography platform integrating NIST-selected PQC algorithms). Anchor
  customer is the Indian government — supplies QKD and QRNG to the Indian
  Army, Indian Navy, BEL, DRDO and WESEE, and is the lead vendor on the
  National Quantum Mission's 1,000-km indigenous quantum communication
  testbed announced in April 2025.

modalities:
  qkd:
    protocol: [BB84, decoy-state, DPS]
    rate_distance: "Armos: ~8,000 secure bps @ ~50 km metro; ~200 bps @ 200 km / 40 dB SMF; co-exists with 10 Gbps classical on same fibre"
    deployed_demos:
      - note: "1,000 km indigenous quantum communication network under National Quantum Mission, built by chaining Armos links; announced by Ministry of Science & Technology"
        source_url: https://www.pib.gov.in/PressReleasePage.aspx?PRID=2114874&reg=3&lang=2
      - note: "iDEX Open Challenge 2.0 — 150 km QKD system with trusted nodes, trials completed with the Indian Army (2022)"
        source_url: https://www.qnulabs.com/about-us
      - note: "25 Armos QKD systems delivered to the Indian Navy (2024)"
        source_url: https://idrw.org/indias-quantum-leap-qnu-labs-targets-military-grade-networks-beyond-1000-km-under-national-quantum-mission/
      - note: "Armos QKD performance validation with VIAVI Solutions on MAP-300 test platform — up to 200 km / 40 dB, QBER <4%"
        source_url: https://thequantuminsider.com/2026/04/09/armos-qkd-real-world-readiness/
      - note: "500 km indigenous quantum-safe intercity QKD network launched"
        source_url: https://timestech.in/qnu-labs-launches-indigenous-500-km-quantum-safe-intercity-qkd-network/
  enabling:
    products:
      - "Tropos QRNG — laser / time-of-arrival single-photon QRNG, ~100 Mbps, NIST SP 800-90B certified; deliveries to DRDO and WESEE"
      - "Armos QKD — fibre QKD appliance, decoy-state DPS protocol, ~200 km / 40 dB reach, 10 Gbps classical co-existence"
  software:
    products:
      - "Hodos — Post-Quantum Cryptography platform integrating NIST-selected PQC algorithms (ML-KEM, ML-DSA family); platform-independent (server, mobile, FPGA, PCIe); hybrid mode with Armos / Tropos / Qosmos"
      - "Qosmos — Entropy-as-a-Service, delivering Tropos QRNG entropy over APIs"
      - "dQKD — software-defined / digital QKD offering for IP networks without distance-bound photonic hardware"

