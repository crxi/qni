positioning: >
  UK photonic quantum-computing company spun out of the University of Oxford
  in 2019. Distinguishing technology is a room-temperature photonic quantum
  memory based on Raman storage in warm atomic vapour, originally developed
  in the Walmsley group at Oxford. The memory provides controllable, low-loss
  interactions between travelling photons and atomic ensembles, enabling
  synchronisation and "repeat-until-success" operations in a photonic
  processor. Ships rack-mounted photonic appliances (PT-1, PT-2) targeting
  quantum machine learning and sampling workloads, integrated with classical
  GPU clusters.

