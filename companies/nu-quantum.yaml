positioning: >
  Cavendish Laboratory spin-out building the "Entanglement Fabric" — a
  vendor-agnostic quantum-networking layer that interconnects heterogeneous
  quantum processors into a modular, distributed fault-tolerant machine.
  Founded in 2018 by Carmen Palacios-Berraquero. Sells the Qubit-Photon
  Interface and the rack-mounted Quantum Networking Unit, which launched in
  June 2025 with <3e-3 Bell-state-measurement error, up to 99.7%
  remote-qubit fidelity, and MHz entanglement-attempt rates. Closed a USD
  60M Series A in December 2025 led by National Grid Partners, with Gresham
  House Ventures, Morpheus Ventures, Amadeus, IQ Capital, Ahren, Cambridge
  Enterprise Ventures, NSSIF, and Sumitomo/Presidio.

