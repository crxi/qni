hq: Boulder, Colorado, USA
founded: 2023
status: private
parent: null
logo:
  domain: mesaquantum.com

positioning: >
  Early-stage chip-scale quantum-sensor startup commercialising vapour-cell
  atomic clocks and Rydberg-atom RF sensors out of Svenja Knappe's group at
  CU Boulder, originally NIST/JILA atomic-clock-on-a-chip work. Founded in
  2023 by Sristy Agrawal (CEO) and Knappe; incubated via NSF I-Corps Hub
  West. Primary market is alternative position-navigation-and-timing
  (Alt-PNT) for GPS-denied operations, with a USD 1.9M SpaceWERX SBIR
  contract supporting miniaturised atomic clocks as a GPS alternative. The
  vapour-cell platform shares physical lineage with warm-atom quantum
  memories used in quantum-networking.

