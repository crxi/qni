positioning: >
  Israeli neutral-atom quantum-computing startup spun out of the Weizmann
  Institute and Technion atomic-physics groups, emerged from stealth in
  April 2026 with a USD 24M seed round co-led by NFX and TPY Capital, with
  Intel Capital, Korea Investment Partners, and the Israel Innovation
  Authority participating. Pursues a Rydberg-interaction architecture with a
  stated long-term scaling target beyond one million qubits. Pre-product as
  of mid-2026, with first-generation high-qubit testbeds under assembly.
  Founded by Nir Davidson, Ofer Firstenberg, Yoav Sagi, and Guy Raz.

