positioning: >
  Zhejiang Jiuzhou Quantum Information Technology Co., Ltd. (QTEC) is a
  Chinese QKD and quantum-cryptography application vendor headquartered in
  Tongxiang / Hangzhou, Zhejiang. Sells fibre QKD equipment (QD705 / QD706
  series), single-photon detectors, quantum random-number generators,
  key-management "quantum key cloud" platforms, and integrated quantum-
  security products (encryption gateways, VPNs, secure mobile phones).
  Positions itself as the principal secondary vendor in a Chinese QKD market
  dominated by QuantumCTek. Listed on China's NEEQ since June 2016 (837638).

modalities:
  qkd:
    protocol: [BB84, decoy-state]
    rate_distance: ""
    deployed_demos:
      - note: Self-developed QD705 / QD706-L QKD devices passed China Academy of Information and Communications Technology (CAICT) TaiR Lab testing; first batch of products certified under China's State Cryptography Administration (OSCCA / SCA) commercial-cryptography testing (July 2021)
        source_url: http://www.qtec.cn/
      - note: 'Co-author of Chinese industry standard YD/T 3907.2-2022 — "Key Components and Modules for QKD based on the BB84 Protocol — Part 2: Single Photon Detector"'
        source_url: http://www.qtec.cn/
      - note: Quantum-security application products deployed in Chinese government, electric-power, finance, defence, energy, transport and public-safety sectors (per company statements; specific customer list not publicly itemised)
        source_url: http://www.qtec.cn/
  enabling:
    products:
      - QD705 / QD706-L Quantum Key Distribution (QKD) systems
      - Single-photon detectors (InGaAs)
      - Quantum Random Number Generator (QRNG) modules and "quantum true-random-number" chip
      - '"Quantum key cloud" / commercial-cryptography-compliant key-management platform'
      - Quantum cloud shield, quantum-security firewall, quantum-security VPN, quantum-security router
      - Quantum-security camera, walkie-talkie, secure mobile phone

