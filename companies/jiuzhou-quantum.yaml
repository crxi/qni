partial:
  - field: name
    as_of: 2026-05-17
    note: >
      User-supplied vendor hint was "JN Optoelectronics (九州光电)". Research did
      not surface any active quantum vendor named 九州光电 / "JN Optoelectronics".
      The closest match — and almost certainly the intended target — is
      浙江九州量子信息技术股份有限公司 (Zhejiang Jiuzhou Quantum Information Technology,
      English short name QTEC). Slug set to jiuzhou-quantum accordingly.
      The Shandong / Jinan / Qingdao metro-QKD deployments mentioned in the
      hints are dominated by QuantumCTek (USTC spin-out) and USTC academic
      groups, not by Jiuzhou — Jiuzhou's headquarters and principal commercial
      activity are in Zhejiang (Tongxiang / Hangzhou), not Shandong.
  - field: hq
    as_of: 2026-05-17
    note: >
      Company registered in Tongxiang (桐乡市), Zhejiang; principal operating
      office reported in Hangzhou per the 2024 annual shareholders meeting
      venue. The user-supplied hint of "Shandong" appears to be a confusion
      with Shandong-province QKD networks (Jinan QMAN, Jinan↔Qingdao TF-QKD)
      which are QuantumCTek / USTC programmes, not Jiuzhou.
  - modalities.qkd.rate_distance
  - field: shareholders
    as_of: 2026-05-17
    note: Controlling-shareholder identification (Zheng Shaohui + concert parties) is from public NEEQ filings; exact percentages and full ownership chain not confirmed from the Chinese-language half-year report
  - field: milestones
    as_of: 2026-05-17
    note: >
      Detailed Shandong-area deployments could not be verified to Jiuzhou
      Quantum; principal Shandong QKD references (Jinan QMAN, Jinan↔Qingdao
      511 km TF-QKD, Jinan-1 micro-satellite) belong to QuantumCTek and USTC
      research groups. A Jiuzhou-specific Shandong contract, if one exists,
      was not surfaced by web search.
  - key_personnel
  - current_flagship.generation

