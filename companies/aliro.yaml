positioning: >
  Quantum-networking software vendor building the control, orchestration,
  and simulation stack for entanglement-based networks. A 2019 Harvard
  spin-out from the Narang Lab; does not build photonic or matter-qubit
  hardware but integrates third-party devices into operable networks for
  telcos, government labs, and data-centre operators. AliroNet was selected
  in 2023 as controller for the EPB Quantum Network in Chattanooga — the
  first US commercial quantum network. Closed a USD 15M oversubscribed
  Series B in February 2026 led by Gutbrain Ventures with Cisco Investments,
  Argon Ventures, and Murata's Wonderstone Ventures.

