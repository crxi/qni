logo:
  domain: quantummotion.com

positioning: >
  UK silicon-spin quantum-computing scale-up building qubits on standard 300 mm
  CMOS wafers through commercial foundry partnerships (GlobalFoundries). Spun
  out of UCL and Oxford in 2017; differentiator is full-stack co-design of the
  silicon QPU with cryogenic control electronics, targeting "quantum in a box,
  not a building" — a data-centre-friendly footprint of a few 19-inch server
  racks rather than warehouse-scale cryogenic plant. Sells research-access
  systems via the UK National Quantum Computing Centre testbed; commercial
  deployment is the Series-C ($160M, May 2026) milestone.

