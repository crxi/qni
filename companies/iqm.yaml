positioning: >
  Superconducting (transmon) quantum-computer vendor selling on-premises
  systems to HPC centres, national labs, and universities, with a Europe-led
  commercial footprint (Munich, Paris, Madrid, Singapore offices alongside
  Espoo HQ). Founded in 2018 as an Aalto University / VTT spin-out by Jan
  Goetz, Mikko Möttönen, Kuan Yen Tan, and Juha Vartiainen. Delivered a
  54-qubit Radiance to LRZ in 2025 under Euro-Q-Exa and is contracted to
  deliver a 300-qubit system to VTT in 2027. Raised USD 320M in September
  2025 led by Ten Eleven Ventures; SPAC merger with Real Asset Acquisition
  Corp announced February 2026.

