slug: cas-quantum-network
name: CAS Quantum Network
categories: [network, qkd]
hq: Shanghai, China
founded: 2016
status: private
parent: null
logo:
  domain: null

positioning: >
  State-affiliated builder and operator of China's National Wide-Area Quantum
  Secure Communication Backbone Network. Jointly founded in November 2016 by
  CAS Holdings (the commercial arm of the Chinese Academy of Sciences) and the
  University of Science and Technology of China (USTC), it functions as a
  network operator and systems integrator rather than a QKD-device vendor:
  it sources decoy-state BB84 hardware from QuantumCTek and Jiuzhou and runs
  the trusted-node fibre backbone, metro networks, and Micius (墨子号)
  satellite-to-ground links. Sits inside the Pan Jianwei (潘建伟) USTC
  ecosystem but is a distinct legal entity from QuantumCTek.

modalities:
  qkd:
    protocol: [BB84, decoy-state]
    rate_distance: "Trusted-node fibre backbone — operator role, not a device vendor; equipment supplied by QuantumCTek and Jiuzhou. Backbone link rates per Chen et al. 2021 averaged tens of kb/s per inter-node hop over the 2,032 km Beijing–Shanghai trunk with 32 trusted nodes."
    deployed_demos:
      - note: "京沪干线 (Jing-Hu Trunk Line) — 2,032 km Beijing–Shanghai backbone, 32 trusted nodes, passed final technical acceptance September 2017"
        source_url: https://english.cas.cn/research/highlight/qp/202101/t20210107_261494.shtml
      - note: "Integrated space–ground quantum network — Beijing–Shanghai trunk linked to the Micius satellite ground stations at Xinglong, Nanshan, Lijiang to span 4,600 km total (Chen et al., Nature 589, 214, 2021)"
        source_url: https://www.nature.com/articles/s41586-020-03093-8
      - note: "National Wide-Area Quantum Secure Communication Backbone Network (国家广域量子保密通信骨干网络) — >10,000 km of fibre completed September 2022, formal state acceptance December 2022; covers Jing-Jin-Ji, Yangtze River Delta, Greater Bay Area, Cheng-Yu, mid-Yangtze, Northeast"
        source_url: https://english.cas.cn/research/highlight/qp/202101/t20210107_261494.shtml
      - note: "CN-QCN as of 2025 — 145 fibre backbone nodes, 20 metropolitan networks, 17 provinces, 80 cities (Chen et al., npj QI 11, 137, 2025)"
        source_url: https://www.nature.com/articles/s41534-025-01089-8
  network:
    role: operator
    products:
      - "National Wide-Area Quantum Secure Communication Backbone Network (国家广域量子保密通信骨干网络) — construction and operations entity"
      - "Beijing–Shanghai trunk line (京沪干线) — owner/operator"
      - "Provincial subsidiaries: Guangdong, Henan, Hubei, Jiangsu, Beijing operating-company SPVs for regional metro-network build-out"
      - "Integration of Micius (墨子号) satellite ground links with terrestrial fibre backbone"

