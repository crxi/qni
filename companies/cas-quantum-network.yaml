    note: >
      Concurrently chair of the Quantum Communication and Information
      Technology standards working group under the China Communications
      Standards Association (CCSA), MIIT.
  - role: Affiliated Principal Investigator (USTC), scientific lead of the national QKD programme
    name: Pan Jianwei (潘建伟)
    since: null
    source_url: https://www.nature.com/articles/s41586-020-03093-8
    note: >
      Pan is not an officer of CAS Quantum Network. He leads the USTC
      Division of Quantum Physics and Quantum Information that designs the
      network science behind the company's deployments and is the senior
      author on the Nature 2021 Beijing–Shanghai / Micius paper and the npj
      QI 2025 CN-QCN paper.

