positioning: >
  Full-stack superconducting quantum-computing vendor. Designs and
  fabricates transmon-style superconducting qubit processors at its in-house
  Fab-1 facility in Fremont, California, with a modular multi-chip
  ("chiplet") architecture that tiles small chips into larger systems to
  side-step monolithic-yield limits. Founded in 2013 by Chad Rigetti;
  NASDAQ-listed since March 2022 (RGTI, SPAC merger with Supernova Partners
  II). The 108-qubit Cepheus-1-108Q general availability launched in April
  2026 at 99.1% median two-qubit fidelity, succeeding the 84-qubit Ankaa-3
  and a 36-qubit 4x9 multi-chip system that hit 99.5% in 2025.

