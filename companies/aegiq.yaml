positioning: >
  UK integrated-photonics vendor commercialising deterministic quantum-dot
  single-photon sources (iSPS) and full-stack photonic-quantum-computing and
  networking subsystems. Spun out of the University of Sheffield in 2019
  from the III-V semiconductor quantum-dot group by Maksym Sich, Andrii
  Iamshanov, and Scott Dufferwiel. Flagship iSPS is a fibre-coupled
  cryogenic quantum-dot source operating at GHz-class repetition rates;
  selected in 2024 to deliver a full-stack photonic quantum-computer testbed
  to the UK National Quantum Computing Centre at Harwell.

