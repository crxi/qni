positioning: >
  Quantum-networking research arm of Cisco Systems Inc. (NASDAQ:CSCO). This
  dossier covers Cisco Quantum Labs and the Outshift-by-Cisco quantum-networking
  programme — not Cisco's broader classical networking business. Cisco does not
  build a quantum computer; its bet is on the telecom-fibre quantum-networking
  layer: photonic encoding translators, entanglement-distribution infrastructure,
  and protocol/control software for inter-QPU networks. Cisco is also an
  active strategic investor in pure-play quantum-networking startups (Aliro,
  Qunnect).

business_units:
  - name: Cisco Quantum Labs
    scope: Research prototype hardware (Cisco Universal Quantum Switch), entanglement-distribution infrastructure, protocol stacks for quantum networks
    hq: San Jose, California, USA
    lead: Vijoy Pandey (SVP, Outshift by Cisco / Cisco Office of the CTO)
    source_url: https://investor.cisco.com/overview/default.aspxnews/news-details/2026/Cisco-Introduces-Universal-Quantum-Switch-Advancing-the-Path-to-a-Quantum-Network/default.aspx
  - name: Outshift by Cisco
    scope: Cisco's incubation arm for emerging technologies; houses the quantum-networking research programme and publishes the public roadmap via the Outshift blog
    hq: San Jose, California, USA
    lead: Vijoy Pandey (SVP)
    source_url: https://outshift.cisco.com/
  - name: Cisco Investments
    scope: Corporate strategic-investment arm; quantum-networking portfolio positions in Aliro Quantum (Series B, 2026) and Qunnect (Series A extension, 2025)
    hq: San Jose, California, USA
    lead: ""
    source_url: https://www.ciscoinvestments.com/

