positioning: >
  Silicon-spin quantum computing built on a standard 22 nm fully-depleted SOI
  (FD-SOI) CMOS process at GlobalFoundries (22FDX). Differentiator is the
  integration of cryogenic CMOS control, readout, and quantum dots on a single
  die — the "UnityQ" Quantum System-on-Chip — packaged as a rack-mounted server
  (Bell-1, 2025; RacQ, 2026) with a self-contained closed-cycle cryocooler at
  ~0.3 K, removing the dilution refrigerator from the deployment envelope.
  UCD spin-out commercialising work from the UCD School of Electrical and
  Electronic Engineering (Staszewski group).

