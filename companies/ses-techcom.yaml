slug: ses-techcom
name: SES Techcom
categories: [qkd, network]
hq: Betzdorf, Luxembourg
founded: 1989
status: acquired
parent: ses
logo:
  domain: ses-techcom.com

positioning: >
  Wholly-owned subsidiary of SES S.A. delivering end-to-end satellite-enabled
  solutions to governmental, institutional and supranational customers. Prime
  contractor and operator for EAGLE-1, a sovereign LEO quantum-key-distribution satellite
  (announced as Europe's first; ~€130M, ESA + European Commission + a consortium
  of 20+ European companies, Vega-C launch from Kourou in late 2026 / early
  2027). Also leads the Luxembourg national quantum-communication
  infrastructure (LuxQCI) consortium under the EuroQCI programme.

modalities:
  qkd:
    protocol: [BB84, decoy-state]
    rate_distance: "C-band optical downlink from LEO via Tesat SCOT80 terminal; phase-encoded double-pulse qubits to European ground stations (3-year in-orbit validation post-launch)"
    deployed_demos:
      - "EAGLE-1 — LEO QKD satellite, SES Techcom as prime contractor and operator, Tesat-built payload, SITAEL platform"
      - "LuxQCI — Luxembourg national quantum-communication infrastructure consortium (InCert, itrust, LuxConnect, LuxTrust, Uni Luxembourg / SnT), SES Techcom lead"
  network:
    role: orchestrator
    products:
      - "EAGLE-1 ground segment — optical ground stations across Europe, key-management infrastructure linking national EuroQCI segments"
      - "LuxQCI architecture and operations"

