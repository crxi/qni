slug: quera
name: QuEra Computing
categories: [qc]
hq: Boston, Massachusetts, USA
founded: 2018
status: private
parent: null
logo:
  domain: quera.com

positioning: >
  Neutral-atom quantum computing built on rubidium-87 Rydberg arrays, spun
  out of the Lukin, Vuletic, and Greiner groups at Harvard and MIT in 2018.
  Operates Aquila, the 256-qubit analog processor that has been publicly
  available on AWS Braket since November 2022 — the first neutral-atom
  machine on a major cloud. Demonstrated 48 logical qubits on a
  reconfigurable atom array in 2024 (Bluvstein et al., Nature 626, 58).
  Announced a roadmap targeting 100 logical qubits by 2026 (the Gemini line);
  closed a USD 230M convertible-note financing in February 2025 led by Google
  Quantum AI and SoftBank Vision Fund 2.

