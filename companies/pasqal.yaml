positioning: >
  French neutral-atom quantum-computing company spun out of Institut
  d'Optique in 2019 by Alain Aspect, Antoine Browaeys, and Thierry Lahaye.
  Builds rubidium-87 optical-tweezer arrays that run both analog
  Hamiltonian-simulation and digital gate-based modes; the only neutral-atom
  vendor with QPUs installed in EuroHPC supercomputing centres and a
  commercial 200-qubit deployment at Saudi Aramco in Dhahran. Flagship Orion
  Gamma carries 140+ qubits; the published roadmap targets early FTQC by
  2028 (Centaurus) and 100 logical qubits by 2029 (Lyra). SPAC business
  combination with Bleichroeder Acquisition Corp II announced March 2026.

