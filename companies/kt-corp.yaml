slug: kt-corp
name: KT Corporation
categories: [network, qkd]
hq: Seoul, South Korea
founded: 1981
status: public
parent: null
logo:
  domain: kt.com

positioning: >
  South Korea's incumbent fixed-line and second-largest mobile carrier
  (KOSPI:030200, NYSE:KT). KT operates a commercial Quantum-Safe Network
  service on its Korean fibre footprint, using QKD endpoints sourced from
  ID Quantique and (in pilot) Toshiba; the public reference deployments are
  the Seoul-Daejeon QKD-as-a-Service testbed (Toshiba) and the ~490 km
  Seoul-Busan hybrid QKD trunk. KT is the lead Korean contributor to
  ITU-T SG13 / SG17 QKD-network standardisation and chairs SG13 WP1; the
  company describes itself as the holder of the most QKD-network-related
  international standard approvals.

business_units:
  - name: KT Quantum Network business
    scope: Operates the Quantum-Safe Network service on KT's commercial fibre; runs QKD pilots and standardisation contributions
    hq: Seoul, South Korea
    lead: ""
    source_url: https://en.prnasia.com/releases/apac/toshiba-group-and-kt-collaborate-on-quantum-key-distribution-pilot-projects-in-south-korea-356200.shtml

modalities:
  qkd:
    protocol: [BB84, decoy-state, T12]
    rate_distance: "Seoul-Busan ~490 km hybrid QKD trunk (KT + Toshiba); Seoul-Daejeon QKDaaS testbed operated 2022-2024"
    deployed_demos:
      - note: Seoul-Busan hybrid QKD network — approximately 490 km optical-fibre route with Toshiba QKD endpoints; described as the longest QKD network built in South Korea and the first application of an ITU-T QoS standard to a long-distance QKD network
        source_url: https://www.global.toshiba/ww/company/digitalsolution/news/2022/0328.html
      - note: Seoul-Daejeon QKD-as-a-Service (QKDaaS) testbed — operated for approximately two years from summer 2022; open testbed for third-party services on KT's fibre
        source_url: https://en.prnasia.com/releases/apac/toshiba-group-and-kt-collaborate-on-quantum-key-distribution-pilot-projects-in-south-korea-356200.shtml
      - note: KT + HEQA Security partnership to deploy QKD on KT telecom infrastructure; demonstrated at Quantum Korea 2025
        source_url: https://quantumcomputingreport.com/kt-and-heqa-security-partner-to-deploy-quantum-key-distribution-for-telecom-infrastructure/
  network:
    role: operator
    products:
      - Quantum-Safe Network service for Korean government and enterprise customers

