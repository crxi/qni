positioning: >
  Quantum-memory and photonic-interconnect company spun out of Harvard's
  Lukin group and the AWS Center for Quantum Networking, commercialising
  silicon-vacancy (SiV) colour-centre memory nodes in diamond nanophotonic
  cavities — the architecture behind the Knaut et al. 2024 Boston-area
  quantum-network demonstration. Founded in early 2024; came out of stealth
  in November 2024 with a USD 18M Series A led by Cerberus Ventures, with
  Murata Electronics and In-Q-Tel participating. Acquired by IonQ on
  30 May 2025 for approximately USD 306.8M in IonQ stock; now operates as
  the SiV-memory / photonic-interconnect business line within IonQ's
  networking roadmap. CEO Mihir Bhaskar is IonQ SVP of R&D.

