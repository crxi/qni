positioning: >
  Huawei Technologies runs an internal quantum-communication R&D programme
  spanning continuous-variable QKD (CV-QKD) prototypes from its Munich
  Research Center and an OTN-integrated QKD board paired with the OptiXtrans
  E6600 optical transport platform. Public product detail outside China is
  thin; the most visible deployment is the 2018 Telefónica + UPM Madrid metro
  CV-QKD field trial, and the headline product is the OptiXtrans E6600 OTN +
  QKD board marketed to government, electric-power, and transportation
  customers. Sales geography is dominated by China and a small set of allied
  markets given US-led export restrictions on Huawei since 2019.

