positioning: >
  Solid-state quantum-memory and quantum-networking hardware startup spun out
  of the University of Chicago Pritzker School of Molecular Engineering and
  Argonne National Laboratory, productising erbium-ion quantum emitters and
  memories in thin-film TiO2 deposited on foundry-fabricated silicon
  photonics. Targets a CMOS-compatible, telecom C-band (~1.5 µm) memory
  platform that interfaces directly with installed optical-fibre networks
  without frequency conversion. Product stack spans Quantum Network Interface
  Controllers (QNIC), Quantum Memory Modules (QMM), a Quantum Control System,
  and an xDQC compiler for heterogeneous QPU interconnect.

