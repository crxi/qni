positioning: >
  Quantum-networking hardware vendor building room-temperature
  rubidium-vapour quantum memories, entangled-photon sources, and
  telecom-band polarization-stabilisation gear as rack-mount appliances.
  Spun out of Eden Figueroa's group at Stony Brook University in 2017;
  operates GothamQ, a leased metropolitan dark-fibre testbed under New York
  City. Flagship Carina turnkey suite launched in 2025; in February 2026
  demonstrated first metro-scale entanglement swapping over commercial fibre
  with Cisco at >99% polarization fidelity. Closed a USD 10M Series A
  extension in June 2025 led by Airbus Ventures with Cisco Investments.

