milestones:
  - date: 2026-04
    tag: network
    headline: "Investor Cisco unveils Universal Quantum Switch — a room-temperature photonic switch that translates between polarization / time-bin / frequency / path encodings with <=4% fidelity degradation and ~1 ns electro-optic reconfiguration. Frames Cisco moving up the quantum-networking stack on top of partners like Qunnect."
    source_url: https://investor.cisco.com/news/news-details/2026/Cisco-Introduces-Universal-Quantum-Switch-Advancing-the-Path-to-a-Quantum-Network/default.aspx
    source_type: press
  - date: 2026-02
    tag: network
    headline: "Qunnect + Cisco demonstrate first metro-scale entanglement swapping over commercial fibre on GothamQ — 17.6 km Brooklyn-to-Manhattan via QTD's 60 Hudson Street datacentre, ~5,400 swapped pairs/hour over deployed fibre at >99% polarization fidelity (~10,000x prior benchmarks); Carina + Cisco Software Orchestrator stack, validates a spoke-and-hub model"
    source_url: https://www.qunnect.inc/press-releases/2026-02-18
    source_type: press
  - date: 2026-01
    tag: network
    headline: Scott Faris appointed to Qunnect Board of Directors
    source_url: https://thequantuminsider.com/2026/01/22/qunnect-scott-faris-board-appointment/
    source_type: press
  - date: 2025-11
    tag: network
    headline: "Investor Cisco announces IBM x Cisco x Fermilab/SQMS quantum-networking partnership targeting microwave-to-optical transducers and networked fault-tolerant QCs by early 2030s. Frames Cisco's expanding networking-stack ambitions; Qunnect remains the rubidium-vapour-memory layer of that strategy."
    source_url: https://newsroom.ibm.com/2025-11-20-ibm-and-cisco-announce-plans-to-build-a-network-of-large-scale,-fault-tolerant-quantum-computers
    source_type: press
