logo:
  domain: intel.com

positioning: >
  Silicon spin-qubit quantum computing research program inside Intel Labs, scoped
  to Intel's Quantum Computing group (Components Research / Intel Labs). The
  strategic bet is fab-compatibility — electron-spin qubits encoded in CMOS-style
  silicon quantum dots, fabricated on Intel's 300-mm production lines at D1
  (Hillsboro) using EUV lithography and the same transistor flow as logic chips,
  paired with cryogenic CMOS control (Horse Ridge) to collapse the room-temperature
  control rack. Research-stage, not yet a commercial product line; the current
  flagship Tunnel Falls is distributed to academic partners under the LPS Qubit
  Collaboratory. Long-running QuTech (TU Delft / TNO) partnership since 2015.

business_units:
  - name: Intel Labs — Quantum Hardware
    scope: Silicon spin-qubit device design, fabrication, and characterisation
    hq: Hillsboro, Oregon, USA
    lead: Jim Clarke (Director, Quantum Hardware)
  - name: Intel Labs — Quantum Applications & Architecture
    scope: Quantum software stack, compilers, and system architecture (Intel Quantum SDK)
    hq: Santa Clara, California, USA
    lead: Anne Matsuura (Director, Quantum & Molecular Technologies)
  - name: QuTech collaboration
    scope: Joint silicon spin-qubit research; co-published 300-mm wafer-scale results
    hq: Delft, Netherlands
    lead: Lieven Vandersypen (QuTech Scientific Director)

