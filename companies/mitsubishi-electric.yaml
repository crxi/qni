positioning: >
  Mitsubishi Electric's quantum-communications research programme runs out of
  the Information Technology R&D Center (Kamakura) and MERL (Cambridge MA).
  One of the four Japanese operators of the NICT-led Tokyo QKD Network in
  2010, supplying a decoy-state BB84 link on the 24 km Otemachi–Hakusan
  section. Current work spans a LEO on-orbit QKD payload demonstration with
  NICT (Terran Orbital Nebula bus, selected January 2026) and a February
  2025 joint research agreement with Quantinuum K.K., Keio University,
  SoftBank and partners on scalable quantum information processing. A
  corporate research programme, not a standalone product line.

