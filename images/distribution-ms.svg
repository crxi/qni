  <desc>MidpointSource entanglement-distribution architecture after Jones et al. NJP 18 083015 (2016). An entangled-photon-pair source (EPPS, typically SPDC) sits at the link midpoint. The source emits two entangled photons outward; each travels L/2 to one of the endpoints. At each endpoint, a local Bell-state analyser interferes the arriving photon with a photon entangled with the local comm qubit (C, green). When both endpoint BSMs herald successfully, the two comm qubits are entangled (magenta sinusoid). The source-side herald is independent of link loss; no two-photon interference at distance.</desc>
