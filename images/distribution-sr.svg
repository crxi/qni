  <desc>SenderReceiver entanglement-distribution architecture after Jones et al. NJP 18 083015 (2016). Alice (sender) emits a photon entangled with her comm qubit (C, green) and sends it across the full link. Bob (receiver) holds his own comm qubit plus the Bell-state analyser; he performs a BSM between Alice's incoming photon and his local C. A successful BSM heralds an entangled pair between A.C and B.C (magenta sinusoid). Only one photon crosses the link; no two-photon interference at distance.</desc>
