<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1480 540" role="img" aria-labelledby="cmp-title cmp-desc">
  <title id="cmp-title">Seven quantum-internet stack proposals, aligned by functional band</title>
  <desc id="cmp-desc">Five horizontal bands: physical, link, network, service, application. Seven columns: Van Meter 2014, Wehner 2018, Dahlberg 2019, Pirker 2019, RFC 9340, Lopez multiplane 2026, Cacciapuoti quantum-native 2026. Each column draws the proposal's layers in the band they correspond to.</desc>
  <style>
    /* Standalone styles — must work when loaded via &lt;img&gt; (no parent CSS).
       Colour values mirror web/src/styles/tokens.css. */
    :root {
      --bg:        #fafafa;
      --text:      #2a2e35;
      --mute:      #6b6f78;
      --rule:      #e1e2e6;

      --c-vm:       #3a7d7d;  /* teal-600 */
      --c-wehner:   #5b8def;  /* platform-superconducting */
      --c-dahlberg: #7fb8c4;  /* platform-photonic */
      --c-pirker:   #e8b65a;  /* platform-neutral-atoms */
      --c-rfc:      #a8408d;  /* magenta-600 */
      --c-lopez:    #7c5fa8;  /* platform-trapped-ions */
      --c-cacc:     #b07070;  /* platform-siv-memory */
    }
    .cmp-band--application { fill: color-mix(in srgb, #3a7d7d 5%, transparent); }
    .cmp-band--service     { fill: color-mix(in srgb, #a8408d 4%, transparent); }
    .cmp-band--network     { fill: color-mix(in srgb, #5b8def 6%, transparent); }
    .cmp-band--link        { fill: color-mix(in srgb, #7c5fa8 4%, transparent); }
    .cmp-band--physical    { fill: color-mix(in srgb, #7fb8c4 6%, transparent); }
    .cmp-band-label  { fill: #6b6f78; font: 600 13px 'Inter', system-ui, sans-serif; text-transform: uppercase; letter-spacing: 0.06em; }
    .cmp-band-rule   { stroke: #e1e2e6; stroke-width: 1; stroke-dasharray: 3 3; }
    .cmp-col-name    { fill: #2a2e35; font: 600 15px 'Inter', system-ui, sans-serif; }
    .cmp-col-year    { fill: #6b6f78; font: 12px 'JetBrains Mono', ui-monospace, monospace; }
    .cmp-swatch      { stroke: #fafafa; stroke-width: 1; }
    .cmp-swatch--vm       { fill: #3a7d7d; }
    .cmp-swatch--wehner   { fill: #5b8def; }
    .cmp-swatch--dahlberg { fill: #7fb8c4; }
    .cmp-swatch--pirker   { fill: #e8b65a; }
    .cmp-swatch--rfc      { fill: #a8408d; }
    .cmp-swatch--lopez    { fill: #7c5fa8; }
    .cmp-swatch--cacc     { fill: #b07070; }
    .cmp-col--vm       { --col-c: #3a7d7d; }
    .cmp-col--wehner   { --col-c: #5b8def; }
    .cmp-col--dahlberg { --col-c: #7fb8c4; }
    .cmp-col--pirker   { --col-c: #e8b65a; }
    .cmp-col--rfc      { --col-c: #a8408d; }
    .cmp-col--lopez    { --col-c: #7c5fa8; }
    .cmp-col--cacc     { --col-c: #b07070; }
    .cmp-col .cmp-box {
      fill: color-mix(in srgb, var(--col-c) 10%, #fafafa);
      stroke: var(--col-c);
      stroke-width: 1.4;
    }
    .cmp-col .cmp-box--span {
      fill: color-mix(in srgb, var(--col-c) 6%, #fafafa);
      stroke-dasharray: 4 3;
    }
    .cmp-col .cmp-box--principles {
      fill: color-mix(in srgb, var(--col-c) 14%, #fafafa);
      stroke-dasharray: 5 3;
    }
    .cmp-box-text       { fill: #2a2e35; font: 600 13.5px 'Inter', system-ui, sans-serif; }
    .cmp-box-text--sub  { fill: #6b6f78; font: 400 11.5px 'Inter', system-ui, sans-serif; }
    .cmp-footnote       { fill: #6b6f78; font: italic 11.5px 'Inter', system-ui, sans-serif; }
  </style>

  <!-- Background bands (5 functional tiers, bottom-up). -->
  <g aria-hidden="true">
    <rect x="170" y="80"  width="1280" height="80" class="cmp-band cmp-band--application"/>
    <rect x="170" y="160" width="1280" height="80" class="cmp-band cmp-band--service"/>
    <rect x="170" y="240" width="1280" height="80" class="cmp-band cmp-band--network"/>
    <rect x="170" y="320" width="1280" height="80" class="cmp-band cmp-band--link"/>
    <rect x="170" y="400" width="1280" height="80" class="cmp-band cmp-band--physical"/>
    <text x="160" y="124" class="cmp-band-label" text-anchor="end">Application</text>
    <text x="160" y="204" class="cmp-band-label" text-anchor="end">Service</text>
    <text x="160" y="284" class="cmp-band-label" text-anchor="end">Network</text>
    <text x="160" y="364" class="cmp-band-label" text-anchor="end">Link</text>
    <text x="160" y="444" class="cmp-band-label" text-anchor="end">Physical</text>
    <line x1="170" y1="80"  x2="1450" y2="80"  class="cmp-band-rule"/>
    <line x1="170" y1="160" x2="1450" y2="160" class="cmp-band-rule"/>
    <line x1="170" y1="240" x2="1450" y2="240" class="cmp-band-rule"/>
    <line x1="170" y1="320" x2="1450" y2="320" class="cmp-band-rule"/>
    <line x1="170" y1="400" x2="1450" y2="400" class="cmp-band-rule"/>
    <line x1="170" y1="480" x2="1450" y2="480" class="cmp-band-rule"/>
  </g>

  <!-- Column headers — swatch + name + year. -->
  <g>
    <circle cx="194"  cy="35" r="5" class="cmp-swatch cmp-swatch--vm"/>
    <text x="270"  y="40" class="cmp-col-name" text-anchor="middle">Van Meter</text>
    <text x="270"  y="60" class="cmp-col-year" text-anchor="middle">2014</text>

    <circle cx="374"  cy="35" r="5" class="cmp-swatch cmp-swatch--wehner"/>
    <text x="450"  y="40" class="cmp-col-name" text-anchor="middle">Wehner</text>
    <text x="450"  y="60" class="cmp-col-year" text-anchor="middle">2018*</text>

    <circle cx="554"  cy="35" r="5" class="cmp-swatch cmp-swatch--dahlberg"/>
    <text x="630"  y="40" class="cmp-col-name" text-anchor="middle">Dahlberg</text>
    <text x="630"  y="60" class="cmp-col-year" text-anchor="middle">2019</text>

    <circle cx="734"  cy="35" r="5" class="cmp-swatch cmp-swatch--pirker"/>
    <text x="810"  y="40" class="cmp-col-name" text-anchor="middle">Pirker &amp; Dür</text>
    <text x="810"  y="60" class="cmp-col-year" text-anchor="middle">2019</text>

    <circle cx="914"  cy="35" r="5" class="cmp-swatch cmp-swatch--rfc"/>
    <text x="990"  y="40" class="cmp-col-name" text-anchor="middle">RFC 9340</text>
    <text x="990"  y="60" class="cmp-col-year" text-anchor="middle">2023</text>

    <circle cx="1094" cy="35" r="5" class="cmp-swatch cmp-swatch--lopez"/>
    <text x="1170" y="40" class="cmp-col-name" text-anchor="middle">Lopez</text>
    <text x="1170" y="60" class="cmp-col-year" text-anchor="middle">2026</text>

    <circle cx="1274" cy="35" r="5" class="cmp-swatch cmp-swatch--cacc"/>
    <text x="1350" y="40" class="cmp-col-name" text-anchor="middle">Cacciapuoti</text>
    <text x="1350" y="60" class="cmp-col-year" text-anchor="middle">2026</text>
  </g>

  <!-- Van Meter 2014: 5 layers, one per band. -->
  <g class="cmp-col cmp-col--vm">
    <rect x="190" y="90"  width="160" height="60" class="cmp-box" rx="3"/>
    <text x="270" y="125" class="cmp-box-text" text-anchor="middle">Application</text>
    <rect x="190" y="170" width="160" height="60" class="cmp-box" rx="3"/>
    <text x="270" y="205" class="cmp-box-text" text-anchor="middle">Transport</text>
    <rect x="190" y="250" width="160" height="60" class="cmp-box" rx="3"/>
    <text x="270" y="285" class="cmp-box-text" text-anchor="middle">Network</text>
    <rect x="190" y="330" width="160" height="60" class="cmp-box" rx="3"/>
    <text x="270" y="365" class="cmp-box-text" text-anchor="middle">Link</text>
    <rect x="190" y="410" width="160" height="60" class="cmp-box" rx="3"/>
    <text x="270" y="445" class="cmp-box-text" text-anchor="middle">Physical</text>
  </g>

  <!-- Wehner 2018: 5-stage capability roadmap. Single tall span. -->
  <g class="cmp-col cmp-col--wehner">
    <rect x="370" y="90"  width="160" height="380" class="cmp-box cmp-box--span" rx="3"/>
    <text x="450" y="123" class="cmp-box-text" text-anchor="middle">FT quantum</text>
    <text x="450" y="143" class="cmp-box-text cmp-box-text--sub" text-anchor="middle">stage 5</text>
    <text x="450" y="199" class="cmp-box-text" text-anchor="middle">Quantum memory</text>
    <text x="450" y="219" class="cmp-box-text cmp-box-text--sub" text-anchor="middle">stage 4</text>
    <text x="450" y="275" class="cmp-box-text" text-anchor="middle">Entanglement</text>
    <text x="450" y="295" class="cmp-box-text cmp-box-text--sub" text-anchor="middle">stage 3</text>
    <text x="450" y="351" class="cmp-box-text" text-anchor="middle">Prep-and-measure</text>
    <text x="450" y="371" class="cmp-box-text cmp-box-text--sub" text-anchor="middle">stage 2</text>
    <text x="450" y="427" class="cmp-box-text" text-anchor="middle">Trusted node</text>
    <text x="450" y="447" class="cmp-box-text cmp-box-text--sub" text-anchor="middle">stage 1</text>
  </g>

  <!-- Dahlberg 2019: link-layer only. -->
  <g class="cmp-col cmp-col--dahlberg">
    <rect x="550" y="330" width="160" height="60" class="cmp-box" rx="3"/>
    <text x="630" y="358" class="cmp-box-text" text-anchor="middle">EGP</text>
    <text x="630" y="378" class="cmp-box-text cmp-box-text--sub" text-anchor="middle">+ DQP scheduler</text>
  </g>

  <!-- Pirker &amp; Dür 2019: 3 recursive tiers. -->
  <g class="cmp-col cmp-col--pirker">
    <rect x="730" y="250" width="160" height="60" class="cmp-box" rx="3"/>
    <text x="810" y="278" class="cmp-box-text" text-anchor="middle">Inter-network</text>
    <text x="810" y="298" class="cmp-box-text cmp-box-text--sub" text-anchor="middle">entanglement routing</text>
    <rect x="730" y="330" width="160" height="60" class="cmp-box" rx="3"/>
    <text x="810" y="358" class="cmp-box-text" text-anchor="middle">Intra-network</text>
    <text x="810" y="378" class="cmp-box-text cmp-box-text--sub" text-anchor="middle">graph-state generation</text>
    <rect x="730" y="410" width="160" height="60" class="cmp-box" rx="3"/>
    <text x="810" y="438" class="cmp-box-text" text-anchor="middle">Point-to-point</text>
    <text x="810" y="458" class="cmp-box-text cmp-box-text--sub" text-anchor="middle">physical entanglement</text>
  </g>

  <!-- RFC 9340: principles, not strict layers. -->
  <g class="cmp-col cmp-col--rfc">
    <rect x="910" y="170" width="160" height="60" class="cmp-box cmp-box--principles" rx="3"/>
    <text x="990" y="198" class="cmp-box-text" text-anchor="middle">Service primitive</text>
    <text x="990" y="218" class="cmp-box-text cmp-box-text--sub" text-anchor="middle">"deliver Bell pair"</text>
    <rect x="910" y="250" width="160" height="60" class="cmp-box cmp-box--principles" rx="3"/>
    <text x="990" y="278" class="cmp-box-text" text-anchor="middle">Network</text>
    <text x="990" y="298" class="cmp-box-text cmp-box-text--sub" text-anchor="middle">(deferred)</text>
    <rect x="910" y="330" width="160" height="60" class="cmp-box" rx="3"/>
    <text x="990" y="358" class="cmp-box-text" text-anchor="middle">Link layer</text>
    <text x="990" y="378" class="cmp-box-text cmp-box-text--sub" text-anchor="middle">named, not specified</text>
  </g>

  <!-- Lopez multiplane 2026: 3 strata. -->
  <g class="cmp-col cmp-col--lopez">
    <rect x="1090" y="90"  width="160" height="140" class="cmp-box" rx="3"/>
    <text x="1170" y="125" class="cmp-box-text" text-anchor="middle">Service stratum</text>
    <text x="1170" y="145" class="cmp-box-text cmp-box-text--sub" text-anchor="middle">key mgmt · sync</text>
    <text x="1170" y="165" class="cmp-box-text cmp-box-text--sub" text-anchor="middle">entglmt distrib.</text>
    <text x="1170" y="185" class="cmp-box-text cmp-box-text--sub" text-anchor="middle">sensing</text>
    <rect x="1090" y="250" width="160" height="140" class="cmp-box" rx="3"/>
    <text x="1170" y="285" class="cmp-box-text" text-anchor="middle">Quantum fabric</text>
    <text x="1170" y="305" class="cmp-box-text cmp-box-text--sub" text-anchor="middle">stratum</text>
    <text x="1170" y="345" class="cmp-box-text cmp-box-text--sub" text-anchor="middle">resource · control</text>
    <text x="1170" y="365" class="cmp-box-text cmp-box-text--sub" text-anchor="middle">telemetry · SDN</text>
    <rect x="1090" y="410" width="160" height="60" class="cmp-box" rx="3"/>
    <text x="1170" y="438" class="cmp-box-text" text-anchor="middle">Connectivity</text>
    <text x="1170" y="458" class="cmp-box-text cmp-box-text--sub" text-anchor="middle">stratum (OTN)</text>
  </g>

  <!-- Cacciapuoti quantum-native 2026: QCP atop QDP. -->
  <g class="cmp-col cmp-col--cacc">
    <rect x="1270" y="170" width="160" height="140" class="cmp-box" rx="3"/>
    <text x="1350" y="205" class="cmp-box-text" text-anchor="middle">Quantum Control</text>
    <text x="1350" y="225" class="cmp-box-text" text-anchor="middle">Plane (QCP)</text>
    <text x="1350" y="260" class="cmp-box-text cmp-box-text--sub" text-anchor="middle">orchestration</text>
    <text x="1350" y="280" class="cmp-box-text cmp-box-text--sub" text-anchor="middle">EDCs</text>
    <rect x="1270" y="330" width="160" height="140" class="cmp-box" rx="3"/>
    <text x="1350" y="365" class="cmp-box-text" text-anchor="middle">Quantum Data</text>
    <text x="1350" y="385" class="cmp-box-text" text-anchor="middle">Plane (QDP)</text>
    <text x="1350" y="420" class="cmp-box-text cmp-box-text--sub" text-anchor="middle">QIA addressing</text>
    <text x="1350" y="440" class="cmp-box-text cmp-box-text--sub" text-anchor="middle">GQF forwarding</text>
  </g>

  <!-- Footnote. -->
  <text x="170" y="510" class="cmp-footnote">* Wehner's "stack" is a 5-stage capability roadmap, not a per-layer split — shown as a single column to highlight the structural difference.</text>
</svg>
