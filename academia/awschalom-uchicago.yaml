group_website: https://pme.uchicago.edu/group/awschalom-group

positioning: >
  The Awschalom group works on colour-centre quantum networking, quantum
  memories, and quantum sensing using diamond NV centres and silicon
  carbide divacancy / silicon-vacancy defects. The group operates the
  Chicago-area entanglement testbed on Argonne dark fibre — among the
  longest land-based quantum links in the United States — and pioneered
  SiC as a CMOS-compatible spin-qubit platform alongside diamond NV.
  David Awschalom is the inaugural director (now chief science officer)
  of Q-NEXT, the DOE National Quantum Information Science Research Center
  led by Argonne.

