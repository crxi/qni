  lab: Quantum Control Laboratory · School of Physics
  also: ARC Centre of Excellence for Engineered Quantum Systems (EQUS); historically Microsoft Station Q Sydney (cryo-CMOS controller programme)

group_website: null

positioning: >
  Cryogenic control electronics, silicon-spin readout, and quantum-engineering
  systems integration at the University of Sydney, led by David Reilly. The
  group pioneered cryo-CMOS controllers — the "Gooseberry" chip work co-authored
  with Microsoft Station Q Sydney — and the broader spin-readout and
  quantum-classical interface stack that any scalable solid-state qubit
  platform needs. The Sydney programme is complementary to UNSW's
  Simmons-driven donor-in-silicon direction: Reilly focuses on the control
  and readout layer rather than the qubit-device layer itself.

