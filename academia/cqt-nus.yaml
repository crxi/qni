institution:
  name: National University of Singapore
  lab: Centre for Quantum Technologies (CQT) · Research Centre of Excellence funded by NRF and MoE Singapore

group_website: https://www.cqt.sg/

positioning: >
  CQT is Singapore's National Research Foundation Research Centre of
  Excellence for quantum information, hosted at NUS and founded in 2007
  under Artur Ekert. It is a multi-PI centre rather than a single-PI group:
  experimental QKD and entangled-photon sources (Christian Kurtsiefer),
  satellite quantum communications (Alexander Ling, who led the SpooQy-1
  CubeSat and co-founded the SpeQtral spinout), foundations and
  device-independent cryptography (Valerio Scarani), and trapped-ion
  qubits and atomic clocks (Manas Mukherjee). Current thrust is the
  National Quantum-Safe Network and space-based QKD payloads.

