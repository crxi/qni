group_website: https://quantum.ustc.edu.cn/web/web/en

positioning: >
  Pan Jianwei's group at USTC is an experimental
  quantum-networking and photonic-quantum-information laboratory. The
  programme spans satellite QKD (Micius; Jinan-1; the 2025
  Beijing–Stellenbosch intercontinental link), long-haul fibre QKD
  (Beijing–Shanghai 2,032 km trunk; twin-field QKD to 1,002 km), photonic
  quantum computing (the Jiuzhang boson-sampling series), and
  multi-photon entanglement distribution. Pan founded the QuantumCTek
  spinout (2009) and the Jinan Institute of Quantum Technology. Current
  focus is space–ground integrated quantum networking.

