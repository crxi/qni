    rate_distance: "TF-QKD over 1,002 km field fibre (Liu PRL 2023); entanglement-based QKD Delingha–Nanshan 1,120 km via Micius (Yin Nature 2020); Beijing–Stellenbosch 12,900 km via Jinan-1 (Li Nature 2025)"
    deployed_demos:
      - "Beijing–Shanghai 2,032 km fibre trunk, 32 trusted nodes (Chen Nature 2021)"
      - "Micius satellite ground-link demos with Vienna, Graz, Delingha, Nanshan, Xinglong (Liao Nature 2017)"
