current_focus:
  name: Quantum foundations, communication, computing and metrology
  description: >
    Per the division's own framing (quantum.ustc.edu.cn) — "Explore quantum
    mystery, enable quantum applications!" — research directions cover
    quantum foundations, fibre-based and free-space quantum communication,
    quantum memory and quantum repeaters, optical and superconducting
    quantum computing, ultra-cold-atom quantum simulation, and quantum
    metrology.
  source_url: https://quantum.ustc.edu.cn/web/en

