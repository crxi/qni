positioning: >
  Theoretical-quantum-information group at MPQ. Cirac co-originated the
  DLCZ protocol for atomic-ensemble quantum repeaters
  (Duan-Lukin-Cirac-Zoller, Nature 2001), the foundational ion-trap
  quantum-computer proposal (Cirac-Zoller, PRL 1995), and tensor-network
  methods (MPS, PEPS, MERA) for many-body quantum computation. The
  reference theory anchor for much of the European experimental
  quantum-network programme, with downstream influence on trapped-ion
  hardware, atomic-ensemble memories, and repeater architecture across
  the field.

