positioning: >
  Akira Furusawa's group is an experimental continuous-variable (CV)
  photonic quantum-information laboratory at the University of Tokyo.
  The team demonstrated the first unconditional CV quantum teleportation
  in 1998 (Furusawa et al., Science 282, 706, with the Caltech Kimble
  group) and has since developed squeezed-light sources, large-scale
  time-domain-multiplexed cluster states, and Gottesman–Kitaev–Preskill
  (GKP) encoded qubits for fault-tolerant photonic computing. The group
  anchors the Japanese CV-photonic-QC programme and runs a parallel
  commercialisation track through RIKEN.

