institution:
  name: California Institute of Technology
  lab: Quantum Optomechanics group · Institute for Quantum Information and Matter (IQIM)
  also: AWS Center for Quantum Computing (Oskar Painter is Director, Caltech-adjacent)

group_website: https://painterlab.caltech.edu

positioning: >
  Oskar Painter's group at Caltech combines optomechanical
  microwave-to-optical transduction with superconducting cavity QED, and
  the same leadership extends to the AWS Center for Quantum Computing
  on the Caltech campus where Painter is Director. The programme
  bridges Caltech academic and AWS commercial quantum-computing R&D.
  The group's piezo-optomechanical transducers are a candidate approach
  for closing the cryogenic-microwave-to-telecom gap that any
  superconducting-qubit network must cross.

