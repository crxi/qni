    Per the group's own framing (painterlab.caltech.edu): the Quantum
    Photonics Group focuses on superconducting quantum circuits for quantum
    information processing and quantum simulation, the quantum physics of
    mesoscopic mechanical objects, hybrid superconducting and acoustic
    quantum circuits, and precision optomechanical sensors.
  source_url: https://painterlab.caltech.edu

