positioning: >
  Mikhail Lukin's group at Harvard works across four overlapping fronts:
  silicon-vacancy (SiV) and nitrogen-vacancy (NV) colour-centre networking
  with diamond nanophotonic cavities; neutral-atom programmable simulators
  scaled to hundreds of atoms via optical tweezers and Rydberg
  interactions, including logical-qubit fault-tolerance demos;
  quantum-repeater prototypes, most recently 35 km telecom-fibre
  entanglement of two SiV memory nodes on a Boston-area loop (Knaut et
  al. 2024); and single-NV magnetometry. Current networking thrust:
  extending SiV-cavity nodes from two-node to multi-node telecom links.

