positioning: >
  Leonid Krivitsky's group at A*STAR IMRE works on single-photon
  instrumentation, quantum imaging with undetected photons, and quantum
  sensing. The lab pioneered mid-infrared microscopy and spectroscopy
  using SPDC photon pairs detected in the visible — decoupling sensing
  and detection wavelengths so silicon detectors can image molecular
  fingerprints in the mid-IR. Krivitsky heads the Quantum Technologies
  for Engineering department at IMRE; the group also develops
  integrated single-photon sources and detectors used by Singapore's
  broader quantum programme alongside CQT and SpeQtral.

