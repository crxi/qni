current_focus:
  name: Atomic-precision quantum computing in silicon
  description: >
    Per the UNSW profile (unsw.edu.au/staff/michelle-simmons): building
    electronic devices in silicon at the atomic scale — including atom-based
    qubits and 3D atomic electronics — toward a silicon quantum computer,
    pursued at UNSW as Director of CQC2T and at the Silicon Quantum
    Computing spinout as Founder and CEO.
  source_url: https://www.unsw.edu.au/staff/michelle-simmons

