positioning: >
  Atomic-precision phosphorus-in-silicon (P-in-Si) quantum-computing group at
  UNSW Sydney, led by Scientia Professor Michelle Simmons. The signature
  method is STM hydrogen-resist lithography followed by phosphine dosing,
  placing individual donor atoms in the silicon lattice with sub-nanometre
  precision (0.13 nm, Nature 2026). This is a different architecture from
  the electrostatic quantum-dot route used by most CMOS-aligned silicon-spin
  programmes. Current focus is scaling deterministic donor arrays into
  multi-qubit logic devices. Simmons is also Founder and CEO of the
  commercial spinout Silicon Quantum Computing (SQC).

