positioning: >
  Experimental quantum-optics group at ANU led by Ping Koy Lam, working
  across continuous-variable (CV) photonic quantum information and
  rare-earth-doped solid-state quantum memories. The rare-earth thread
  (Eu:Y2SiO5, Pr:Y2SiO5, Er-doped crystals) has produced several of the
  field's longest coherent optical-storage demonstrations, positioning the
  platform as a candidate node for fibre-compatible quantum repeaters. In
  parallel the group runs CV squeezing, CV teleportation, and quantum-key
  experiments. Lam is also Chief Quantum Scientist at A*STAR (Singapore).

