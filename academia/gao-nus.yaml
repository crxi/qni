group_website: https://quantumcrew.org/

positioning: >
  Yvonne Gao's qcrew at NUS is a Yale-trained superconducting + circuit-QED
  + bosonic-code group anchoring Singapore's experimental superconducting
  quantum-computing capability. The lab builds microwave-cavity hardware and
  develops non-Gaussian bosonic states for error-mitigated information
  processing, with two 2025 PRX Quantum papers on cavity-coupled qubits and
  a 2024 Nature Communications result on transposition across light-matter
  interaction regimes. Gao is an NRF Fellow (2020) and NUS Presidential
  Young Professor; the group sits inside CQT and contributes to the
  superconducting thread of Singapore's National Quantum Computing Hub.

