current_focus:
  name: Modular bosonic cQED devices for robust quantum computing
  description: >
    Per qcrew's own framing (quantumcrew.org): building modular quantum
    devices to enable robust quantum computing and explore novel phenomena
    in quantum physics, across three thrusts — expanding the bosonic cQED
    hardware toolbox, leveraging non-Gaussian bosonic states, and developing
    bosonic quantum information processing techniques.
  source_url: https://quantumcrew.org/

