institution:
  name: Nanyang Technological University (NTU)
  lab: School of Physical & Mathematical Sciences · Nanyang Quantum Hub (NQH) · Quantum Science and Engineering Centre (QSec)
  also: Joint programmes with CQT (NUS) and A*STAR via the National Quantum Office

group_website: https://www.ntu.edu.sg/nqh

positioning: >
  NTU's quantum-information research is consolidated under the Nanyang
  Quantum Hub at the School of Physical & Mathematical Sciences and the
  newer Quantum Science and Engineering Centre, complementing the larger
  CQT programme at NUS down the road. The hub spans nine faculty across
  quantum computing theory, ultracold-atom platforms, superconducting
  devices, and quantum sensing, with notable activity in
  quantum-thermodynamic foundations (Gu), Rydberg / ultracold-gas
  simulators (Wilkowski, Dumke), and atom-nanophotonics. The hub has a
  focused programme in quantum foundations and sensing.

