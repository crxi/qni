current_focus:
  name: Applied quantum technologies and engineered quantum systems
  description: >
    Per NQH's own framing (ntu.edu.sg/nqh): a collaborative research
    platform focusing on quantum technologies, organised across two areas —
    applied quantum technologies (quantum computing, sensors, communication,
    algorithms) and engineered quantum systems (quantum photonics, many-body
    systems, solid-state materials, cold atoms, superconducting resonators).
  source_url: https://www.ntu.edu.sg/nqh

