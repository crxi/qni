current_focus:
  name: Diamond-spin quantum systems for a quantum internet
  description: >
    Per the lab's own framing (qutech.nl/lab/hanson-lab): exploiting the
    properties of spins in diamond to study and engineer interactions
    between individual quantum systems, with the long-term goal of building
    a quantum computer and realising a quantum internet.
  source_url: https://qutech.nl/lab/hanson-lab/

