positioning: >
  Ronald Hanson's group at QuTech is a reference experimental laboratory
  for nitrogen-vacancy (NV) centre quantum networking, with a track record
  of "firsts" in heralded solid-state entanglement, loophole-free Bell
  tests, three-node NV networks, and most recently a 25 km Delft–The Hague
  link over deployed telecom fibre. Current work extends NV memory
  coherence, telecom-band frequency conversion, and multi-node protocol
  stacks, and pursues group-IV colour centres (SiV, tin-vacancy) as
  longer-coherence successors to NV. Specific demonstrations are listed in
  milestones.

