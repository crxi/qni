institution:
  name: University of Waterloo
  lab: Institute for Quantum Computing (IQC) · Department of Physics & Astronomy · Department of Electrical & Computer Engineering · Department of Chemistry · Department of Combinatorics & Optimization
  also: Affiliations with Perimeter Institute for Theoretical Physics; collaboration with the Communications Security Establishment (CSE) on QKD security analysis; Canadian Space Agency (CSA) on the QEYSSat mission

group_website: https://uwaterloo.ca/institute-for-quantum-computing/

positioning: >
  IQC is Canada's national quantum-information research centre, hosted at
  the University of Waterloo and founded in 2002 under Raymond Laflamme
  with a founding gift from Mike and Ophelia Lazaridis. It is a multi-PI
  institute spanning more than thirty faculty across Physics & Astronomy,
  Electrical & Computer Engineering, Chemistry, and Combinatorics &
  Optimization. Active programmes cover QKD theory and experiment
  (terrestrial and satellite via the QEYSSat mission with the Canadian
  Space Agency), superconducting and trapped-ion qubits, spin-based
  architectures in semiconductors, and quantum sensing.

