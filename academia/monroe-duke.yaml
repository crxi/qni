institution:
  name: Duke University
  lab: Duke Quantum Center · Department of Electrical & Computer Engineering · Department of Physics
  also: Joint Quantum Institute (JQI, University of Maryland / NIST) — historical and continuing affiliation

group_website: https://quantum.duke.edu/

positioning: >
  Christopher Monroe's group works on trapped-ion quantum computing and
  ion-photon networking, and produced the foundational demonstrations of
  remote ion-ion entanglement via heralded photon interference that
  underpin modern matter-qubit network architectures. Monroe co-founded
  IonQ in 2015 (see companies/ionq.yaml) and relocated the primary
  laboratory from JQI Maryland to Duke around 2021 as founding Director
  of the Duke Quantum Center. Current effort centres on multi-species
  Ba-138 / Yb-171 ion-trap nodes for modular ion-network testbeds.

