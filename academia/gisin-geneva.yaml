    Per the group's own framing (unige.ch/gap/qic): the applied physics
    department at the University of Geneva studies a wide range of subjects
    in quantum information and communication, organised around four areas —
    quantum technologies, quantum repeaters and memories, quantum networks,
    and quantum theory — as a collaborative effort spanning theory and
    experiment, fundamental and applied research.
