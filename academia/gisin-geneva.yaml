slug: gisin-geneva
name: Gisin group (Geneva)
categories: [qkd, memory]
hq: Geneva, Switzerland
founded: 1988
status: active
parent: null

institution:
  name: University of Geneva
  lab: Group of Applied Physics — Optique (GAP-Optique) · Department of Applied Physics
  also: ID Quantique (spinout, 2001) shares lineage and several staff

group_website: https://www.unige.ch/gap/qic/

positioning: >
  Foundational European experimental QKD group. Nicolas Gisin (now
  emeritus) ran the long-distance Bell-test and fibre-QKD programme
  through the 1990s–2010s, including the 1998 Lake Geneva
  installed-fibre Bell-violation test, and co-founded ID Quantique
  in 2001 with Grégoire Ribordy and Hugo Zbinden. The experimental
  line continues under Hugo Zbinden at GAP-Optique, which delivered
  the Boaron et al. 405 km field-fibre QKD record (PRL 121.190502,
  2018). Current thrusts are long-haul fibre QKD and rare-earth-doped
  crystal quantum memories under Rob Thew.

