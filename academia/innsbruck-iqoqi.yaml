institution:
  name: University of Innsbruck + Austrian Academy of Sciences (joint)
  lab: IQOQI Innsbruck · Institut für Experimentalphysik · Institut für Theoretische Physik

group_website: https://www.iqoqi-innsbruck.at/

positioning: >
  One of Europe's longest-established quantum-information centres. The Cirac–Zoller
  trapped-ion gate proposal (PRL 1995) originated here in collaboration
  with MPQ, and Rainer Blatt's group ran many of the first multi-qubit
  ion-gate demonstrations through the 2000s. IQOQI is a multi-PI centre,
  not a single-PI group: theory under Peter Zoller and Hans Briegel
  (the latter co-authored the measurement-based quantum-computing
  framework), experimental ions under Blatt and Thomas Monz (also the
  AQT spinout founder), and ion–photon network interfaces under Tracy
  Northup.

