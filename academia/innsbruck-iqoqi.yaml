current_focus:
  name: Quantum optics and quantum information
  description: >
    Per IQOQI Innsbruck's own framing (iqoqi.at): "Pioneering Quantum
    Science", organised across six research groups spanning experimental
    platforms (ultracold atoms, ion traps, optical tweezers, superconducting
    circuits) and theoretical work in quantum optics, quantum simulation
    and quantum information, with applications in quantum computing,
    metrology and networking.
  source_url: https://www.iqoqi.at/en/

