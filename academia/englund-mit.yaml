institution:
  name: Massachusetts Institute of Technology (MIT)
  lab: Quantum Photonics Laboratory · Research Laboratory of Electronics (RLE) · Department of Electrical Engineering and Computer Science (EECS)

group_website: https://qp.mit.edu/

positioning: >
  Dirk Englund's MIT group works at the intersection of integrated
  quantum photonics and quantum networking. The programme covers
  colour-centre qubits (SiV, NV, SnV) heterogeneously integrated onto
  photonic chips, scalable photonic quantum-network nodes, on-chip
  microwave-to-optical transduction, and superconducting-nanowire
  single-photon detectors. The group is a collaborator on the
  Boston-loop repeater demonstrations led from Harvard, and builds much
  of the photonic-integration plumbing that the wider Boston quantum-
  networking ecosystem runs on.

