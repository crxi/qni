positioning: >
  Theory and protocols group at QuTech, the theory-side sibling to the
  Hanson experimental NV-network programme. Stephanie Wehner is co-author
  of RFC 9340, the IETF "Architectural Principles for a Quantum Internet"
  document, and lead author of the canonical Wehner-Elkouss-Hanson Science
  2018 "stages of a quantum internet" roadmap. The group works on
  link-layer and network-layer protocols, simulation (NetSquid), and
  integration testing on the QuTech testbed. Wehner serves as Roadmap
  Coordinator of the EU Quantum Internet Alliance and coordinates the
  Dutch QNetworks programme; she previously held a faculty position at
  CQT NUS before joining Delft.

