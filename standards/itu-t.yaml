      The most substantive ITU-T document on entanglement-based
      networking. Defines quantum network ("entangled-qubits-assisted
      network"), quantum repeater, quantum router, entanglement
      purification, entanglement swapping. §10 lays out a seven-Study-
      Group standardisation roadmap (SG2/11/12/13/15/17/20).

