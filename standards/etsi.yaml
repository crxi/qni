    pdf: reference/standards/ETSI/gs_QKD015v020101p.pdf
    summary: SDN control interface for QKD nodes - the southbound API for QKDN controllers.

  - id: GS QKD 016
    title: Quantum Key Distribution (QKD); Common Criteria Protection Profile - Pair of Prepare and Measure Quantum Key Distribution Modules
    type: recommendation
    date: 2024-01
    group: ISG-QKD
    tags: [qkd-protocol, security]
    status: in-force
    url: https://www.etsi.org/deliver/etsi_gs/QKD/001_099/016/02.01.01_60/gs_QKD016v020101p.pdf
    pdf: reference/standards/ETSI/gs_QKD016v020101p.pdf
    summary: >
      Common Criteria Protection Profile for a P&M QKD-module pair.
      Adopted by Germany's BSI as BSI-CC-PP-0120, making it the EU's
      first CC-certifiable QKD specification.

  - id: GS QKD 018
    title: Quantum Key Distribution (QKD); Orchestration Interface for Software Defined Networks
    type: recommendation
    date: 2022-04
    group: ISG-QKD
    tags: [qkdn]
    status: in-force
    url: https://www.etsi.org/deliver/etsi_gs/QKD/001_099/018/01.01.01_60/gs_QKD018v010101p.pdf
    pdf: reference/standards/ETSI/gs_QKD018v010101p.pdf
    summary: Northbound orchestration interface for QKDN controllers (above the GS QKD 015 southbound).

