    tags: [crypto-meta]
    status: informational
    url: https://www.etsi.org/deliver/etsi_tr/103600_103699/103617/01.01.01_60/tr_103617v010101p.pdf
    pdf: reference/standards/ETSI/tr_103617v010101p.pdf
