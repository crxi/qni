body:
  id: etsi
  name: European Telecommunications Standards Institute
  short_name: ETSI
  url: https://www.etsi.org
  scope: >
    European standards body, also used by industry worldwide. ETSI's
    quantum work began in 2008 with the Industry Specification Group on
    QKD (ISG-QKD), which produced the GS QKD-series specifications that
    most commercial QKD vendors implement. In 2025 ETSI approved a full
    Technical Committee on Quantum Technologies (TC QT) with broader
    scope.
  notes: >
    Two relevant groups: (1) ISG-QKD - QKD components, interfaces, and
    security. (2) TC CYBER QSC - post-quantum and hybrid cryptography.
    (3) TC QT (new, 2025) - quantum communications, networks, satellite,
    sensing, QRNG. Documents are free to download from etsi.org/standards.

standards:
  # ISG-QKD Group Specifications (normative, "GS")
  - id: GS QKD 002
    title: Quantum Key Distribution; Use Cases
    type: recommendation
    date: 2010-06
    group: ISG-QKD
    tags: [qkdn]
    status: informational
    url: https://www.etsi.org/deliver/etsi_gs/QKD/001_099/002/01.01.01_60/gs_qkd002v010101p.pdf
