    pdf: reference/standards/ETSI/tr_103619v010101p.pdf
    summary: Migration playbook for moving an enterprise crypto estate to quantum-safe schemes (PQC, QKD, hybrid).

  - id: TS 103 744
    title: CYBER; Quantum-Safe Cryptography (QSC); Quantum-safe Hybrid Key Establishment
    type: recommendation
    date: 2025-03
    group: TC CYBER QSC
    tags: [crypto-meta]
    status: in-force
    url: https://www.etsi.org/deliver/etsi_ts/103700_103799/103744/01.02.01_60/ts_103744v010201p.pdf
    pdf: reference/standards/ETSI/ts_103744v010201p.pdf
    summary: >
      Specification for hybrid key establishment combining classical
      and post-quantum KEMs. The European counterpart to NIST's hybrid
      drafts; widely cited as a baseline for hybrid TLS / IPsec.

  # White Papers
  - id: WP 27
    title: Implementation Security of Quantum Cryptography
    type: technical-report
    date: 2018-07
    group: ISG-QKD
    tags: [qkd-protocol, security]
    status: informational
    url: https://www.etsi.org/images/files/ETSIWhitePapers/etsi_wp27_qkd_imp_sec_FINAL.pdf
    pdf: reference/standards/ETSI/etsi_wp27_qkd_imp_sec.pdf
    summary: >
      White Paper on implementation-security challenges in commercial
      QKD (side channels, source flaws, detector attacks). Co-authored
      by 20+ practitioners including Lucamarini, Shields, Lütkenhaus,
      Makarov.

  # TC QT (new committee, 2025)
  - id: TC QT
    title: Technical Committee on Quantum Technologies (charter)
    type: charter
    date: 2025
    group: TC QT
    tags: [qnet, qkd-protocol, sensing, qrng, crypto-meta]
    status: in-force
    url: https://www.etsi.org/technical-groups/qt/
    summary: >
      Newly chartered ETSI Technical Committee (2025) with 90+ founding
      participants from Europe, Canada, Singapore, and Japan. Chaired
      by Mark Pecen (Approach Infinity). Vice-chairs from GovStrat,
      Leonardo, Toshiba, and Huawei. Scope: quantum communications,
      quantum networks, satellite quantum comms, quantum sensing, QRNG,
      security. Expected to absorb / supersede some ISG-QKD work.
    note: Charter only; first deliverables pending as of May 2026.

